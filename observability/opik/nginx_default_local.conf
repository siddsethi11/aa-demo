client_max_body_size 2G;
client_header_buffer_size 16k;
large_client_header_buffers 4 64k;

resolver 127.0.0.11 valid=30s;
resolver_timeout 2s;

upstream backend {
    zone backend 64k;
    server opik-backend:8080 resolve;
    keepalive 16;
}

server {
    listen ${NGINX_PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        add_header Content-Type text/plain;
        access_log off;
        otel_trace off;
        return 200 "healthy\n";
    }

    # Local demo guardrail: these non-trace feature endpoints can trigger
    # ClickHouse instability in the embedded Opik stack. The AA demo only needs
    # trace browsing, so return empty collections and keep the trace UI usable.
    location ^~ /api/v1/private/optimizations/ {
        default_type application/json;
        return 200 '{"page":1,"size":0,"total":0,"content":[],"sortable_by":[]}';
    }

    location ^~ /api/v1/private/experiments/ {
        default_type application/json;
        return 200 '{"page":1,"size":0,"total":0,"content":[],"sortable_by":[]}';
    }

    location ^~ /api/v1/private/annotation-queues/ {
        default_type application/json;
        return 200 '{"page":1,"size":0,"total":0,"content":[],"sortable_by":[]}';
    }

    location @api {
        rewrite /api/(.*) /$1 break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        try_files /dev/null @api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Trace-ID $otel_trace_id;
}
