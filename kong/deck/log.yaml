_format_version: "3.0"
plugins:
- config:
    content_type: application/json
    custom_fields_by_lua:
      streams: local ts=string.format('%18.0f', os.time()*1000000000) local log_payload         =
        kong.log.serialize() local service = log_payload['service'] or 'noService'
        local cjson         = require "cjson" local payload_string = cjson.encode(log_payload)
        local t         = { {stream = {gateway='ai-gateway', service=service['name']},
        values={{ts,         payload_string}}} } return t
    flush_timeout: 2
    headers: {}
    http_endpoint: http://loki:3100/loki/api/v1/push
    keepalive: 60000
    method: POST
    queue:
      concurrency_limit: 1
      initial_retry_delay: 0.01
      max_batch_size: 1
      max_bytes: null
      max_coalescing_delay: 1
      max_entries: 10000
      max_retry_delay: 60
      max_retry_time: 60
    queue_size: null
    retry_count: null
    timeout: 10000
  enabled: true
  name: http-log
  protocols:
  - grpc
  - grpcs
  - http
  - https