_format_version: "3.0"

plugins:
  - name: http-log
    config:
      http_endpoint: http://loki:3100/loki/api/v1/push
      method: POST
      content_type: application/json
      timeout: 10000
      keepalive: 60000
      flush_timeout: 2
      queue:
        concurrency_limit: 1
        initial_retry_delay: 0.01
        max_coalescing_delay: 1
        max_entries: 10000
        max_batch_size: 1
        max_retry_delay: 60
        max_retry_time: 60
      headers: {}
      custom_fields_by_lua:
        streams: >-
          local ts = string.format('%18.0f', os.time() * 1000000000)
          local log_payload = kong.log.serialize()
          local service = log_payload['service'] or { name = 'noService' }
          local route = log_payload['route'] or { name = 'noRoute' }
          local consumer = log_payload['consumer'] or {}
          local request = log_payload['request'] or {}
          local request_headers = request['headers'] or {}
          local response = log_payload['response'] or {}
          local status_code = tonumber(response['status'] or 0) or 0
          local status = tostring(status_code)
          local status_class = tostring(math.floor(status_code / 100)) .. 'xx'
          local run_id = tostring(request_headers['x-demo-run-id'] or request_headers['X-Demo-Run-Id'] or '')
          local component = 'gateway'
          if route['name'] == 'mock-mcp-route' then
            component = 'mcp'
          elseif string.sub(service['name'] or '', 1, 3) == 'ai-' then
            component = 'llm'
          elseif service['name'] == 'orchestrator-service' or service['name'] == 'support-agent-service' or service['name'] == 'success-agent-service' then
            component = 'agent'
          elseif service['name'] == 'mock-api-service' then
            component = 'backend'
          elseif service['name'] == 'ui-service' then
            component = 'ui'
          end
          local ai = log_payload['ai'] or {}
          local mcp = ai['mcp'] or {}
          local mcp_rpc = mcp['rpc'] or {}
          local mcp_entry = mcp_rpc[1] or {}
          local proxy = ai['proxy'] or {}
          local proxy_payload = proxy['payload'] or {}
          local meta = proxy['meta'] or {}
          local usage = proxy['usage'] or {}
          local cache = proxy['cache'] or {}
          local judge = proxy['ai-llm-as-judge'] or {}
          local judge_meta = judge['meta'] or {}
          local judge_usage = judge['usage'] or {}
          local function extract_request_text(messages)
            if type(messages) ~= 'table' then
              return ''
            end
            local parts = {}
            for _, message in ipairs(messages) do
              local content = type(message) == 'table' and message['content'] or nil
              if type(content) == 'string' and content ~= '' then
                table.insert(parts, content)
              elseif type(content) == 'table' then
                local nested = {}
                for _, item in ipairs(content) do
                  if type(item) == 'table' and item['type'] == 'text' and item['text'] then
                    table.insert(nested, tostring(item['text']))
                  end
                end
                if #nested > 0 then
                  table.insert(parts, table.concat(nested, ' '))
                end
              end
            end
            return table.concat(parts, '\n\n')
          end
          local function extract_response_text(response_payload)
            if type(response_payload) ~= 'table' then
              return ''
            end
            local choices = response_payload['choices']
            local first = type(choices) == 'table' and choices[1] or nil
            local message = type(first) == 'table' and first['message'] or {}
            local content = type(message) == 'table' and message['content'] or nil
            if type(content) == 'string' then
              return content
            end
            if type(content) == 'table' then
              local nested = {}
              for _, item in ipairs(content) do
                if type(item) == 'table' and item['type'] == 'text' and item['text'] then
                  table.insert(nested, tostring(item['text']))
                end
              end
              return table.concat(nested, ' ')
            end
            return ''
          end
          local prompt_tokens = tonumber(usage['prompt_tokens'] or usage['input_tokens'] or 0) or 0
          local completion_tokens = tonumber(usage['completion_tokens'] or usage['output_tokens'] or 0) or 0
          local total_tokens = tonumber(usage['total_tokens'] or (prompt_tokens + completion_tokens) or 0) or 0
          local provider_name = tostring(meta['provider_name'] or '')
          local model_name = tostring(meta['response_model'] or meta['request_model'] or '')
          local usage_cost = tonumber(usage['cost'])
          if usage_cost == nil or usage_cost <= 0 then
            if provider_name == 'openai' and string.find(model_name, 'gpt-4o-mini', 1, true) then
              usage_cost = ((prompt_tokens * 0.15) + (completion_tokens * 0.60)) / 1000000
            elseif provider_name == 'gemini' and string.find(model_name, 'gemini-2.5-flash', 1, true) then
              usage_cost = ((prompt_tokens * 0.30) + (completion_tokens * 2.50)) / 1000000
            else
              usage_cost = 0
            end
          end
          log_payload['llm_usage'] = {
            provider_name = provider_name,
            request_model = tostring(meta['request_model'] or ''),
            response_model = tostring(meta['response_model'] or ''),
            prompt_tokens = prompt_tokens,
            completion_tokens = completion_tokens,
            total_tokens = total_tokens,
            cost = usage_cost,
            time_per_token = usage['time_per_token'],
            time_to_first_token = usage['time_to_first_token'],
          }
          log_payload['llm_usage_prompt_tokens'] = prompt_tokens
          log_payload['llm_usage_completion_tokens'] = completion_tokens
          log_payload['llm_usage_total_tokens'] = total_tokens
          log_payload['llm_usage_cost'] = usage_cost
          log_payload['llm_usage_model'] = model_name
          log_payload['llm_usage_provider'] = provider_name
          log_payload['llm_latency_ms'] = tonumber(meta['llm_latency'] or 0) or 0
          log_payload['ai_cache_status'] = tostring(cache['cache_status'] or '')
          log_payload['ai_cache_fetch_latency'] = tonumber(cache['fetch_latency'] or 0) or 0
          log_payload['ai_cache_embeddings_provider'] = tostring(cache['embeddings_provider'] or '')
          log_payload['ai_cache_embeddings_model'] = tostring(cache['embeddings_model'] or '')
          log_payload['ai_cache_embeddings_latency'] = tonumber(cache['embeddings_latency'] or 0) or 0
          log_payload['judge_input'] = extract_request_text(proxy_payload['request'] and proxy_payload['request']['messages'] or {})
          log_payload['judge_output'] = extract_response_text(proxy_payload['response'] or {})
          log_payload['judge_inference_model'] = tostring(judge_meta['request_model'] or '')
          log_payload['judge_model'] = tostring(judge_meta['response_model'] or '')
          log_payload['judge_provider'] = tostring(judge_meta['provider_name'] or '')
          log_payload['judge_latency_ms'] = tonumber(judge_meta['llm_latency'] or 0) or 0
          log_payload['judge_accuracy'] = tonumber(judge_usage['llm_accuracy'] or 0) or 0
          log_payload['run_id'] = run_id
          log_payload['mcp_session_id'] = tostring(mcp['mcp_session_id'] or '')
          log_payload['mcp_method'] = tostring(mcp_entry['method'] or '')
          log_payload['mcp_tool_name'] = tostring(mcp_entry['tool_name'] or '')
          log_payload['mcp_tool_latency'] = tonumber(mcp_entry['latency'] or 0) or 0
          log_payload['mcp_response_body_size'] = tonumber(mcp_entry['response_body_size'] or 0) or 0
          local cjson = require 'cjson'
          local payload_string = cjson.encode(log_payload)
          return {
            {
              stream = {
                gateway = 'kong-unified-governance',
                component = component,
                service = tostring(service['name'] or 'noService'),
                route = tostring(route['name'] or 'noRoute'),
                consumer = tostring(consumer['username'] or consumer['custom_id'] or consumer['id'] or 'anonymous'),
                method = tostring(request['method'] or 'UNKNOWN'),
                status = status,
                status_class = status_class,
                run_id = run_id,
                mcp_method = tostring(mcp_entry['method'] or ''),
                mcp_tool_name = tostring(mcp_entry['tool_name'] or ''),
              },
              values = {
                { ts, payload_string }
              }
            }
          }

services:
  - name: ui-service
    url: http://ui:80
    routes:
      - name: ui-route
        paths:
          - /
        strip_path: false

  - name: ai-orchestrator-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-chat-route
        paths:
          - /ai/orchestrator/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            retries: 1
            failover_criteria:
              - error
              - timeout
              - http_404
              - non_idempotent
              - http_403
              - http_429
              - http_502
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
                options:
                  input_cost: 0.30
                  output_cost: 2.50
                  upstream_url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
              weight: 50

  - name: ai-orchestrator-failover-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-failover-demo-chat-route
        paths:
          - /ai/orchestrator-failover-demo/chat/completions
        strip_path: false
        methods:
          - POST
      - name: ai-orchestrator-failover-simulator-route
        paths:
          - /llm-failure-simulator
        strip_path: false
        methods:
          - POST
        plugins:
          - name: request-termination
            config:
              status_code: 503
              message: Simulated primary LLM outage
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            connect_timeout: 60000
            fail_timeout: 10000
            failover_criteria:
              - error
              - http_403
              - http_404
              - http_429
              - http_500
              - http_502
              - http_503
              - http_504
              - invalid_header
              - non_idempotent
              - timeout
            hash_on_header: X-Kong-LLM-Request-ID
            latency_strategy: tpot
            max_fails: 3
            read_timeout: 60000
            retries: 3
            slots: 10000
            tokens_count_strategy: total-tokens
            write_timeout: 60000
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
                  upstream_url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
                options:
                  input_cost: 0.30
                  output_cost: 2.50
              weight: 50

  - name: ai-orchestrator-token-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-token-demo-chat-route
        paths:
          - /ai/orchestrator-token-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
      - name: ai-rate-limiting-advanced
        config:
          llm_providers:
            - name: openai
              limit:
                - 1
              window_size:
                - 300

  - name: ai-orchestrator-prompt-enhance-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-prompt-enhance-demo-chat-route
        paths:
          - /ai/orchestrator-prompt-enhance-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-prompt-decorator
        config:
          prompts:
            prepend:
              - role: system
                content: You are responding under AI governance enforced by Kong Gateway.
              - role: system
                content: >-
                  Enhanced escalation policy for this demo:
                  1) Respond in an executive escalation format with sections for Situation, Risk, Actions, and Next Checkpoint.
                  2) State customer posture explicitly and keep the tone enterprise-safe.
                  3) Mention regulatory or data residency considerations when they are relevant.
                  4) End with a confidence score and a named owner.
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60

  - name: ai-orchestrator-semantic-guard-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-semantic-guard-demo-chat-route
        paths:
          - /ai/orchestrator-semantic-guard-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-semantic-prompt-guard
        config:
          embeddings:
            auth:
              header_name: Authorization
              header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
            model:
              provider: openai
              name: text-embedding-3-small
          search:
            threshold: 0.5
          vectordb:
            strategy: redis
            distance_metric: cosine
            threshold: 0.2
            dimensions: 1024
            redis:
              host: ${{ env "DECK_REDIS_HOST" }}
              port: 6379
          rules:
            match_all_conversation_history: true
            deny_prompts:
              - Requests to reveal employee personal contact information or private customer data
              - Requests to disclose internal credentials, access instructions, or confidential system details
              - Requests to bypass security controls or reveal private infrastructure information
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60

  - name: ai-orchestrator-semantic-cache-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-semantic-cache-demo-chat-route
        paths:
          - /ai/orchestrator-semantic-cache-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-semantic-cache
        config:
          embeddings:
            auth:
              header_name: Authorization
              header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
            model:
              provider: openai
              name: text-embedding-3-small
              options:
                upstream_url: https://api.openai.com/v1/embeddings
          vectordb:
            dimensions: 1024
            distance_metric: cosine
            strategy: redis
            threshold: 0.1
            redis:
              host: ${{ env "DECK_REDIS_HOST" }}
              port: 6379
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60

  - name: ai-orchestrator-judge-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-judge-demo-chat-route
        paths:
          - /ai/orchestrator-judge-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-llm-as-judge
        config:
          prompt: |
            You are a strict evaluator. You will be given a request and a response.
            Your task is to judge whether the response is correct and useful for executive triage.
            Assign a score between 1 and 100, where 100 is completely correct and highly useful,
            and 1 is incorrect, misleading, or irrelevant. Return a single number only.
          http_timeout: 60000
          https_verify: true
          ignore_assistant_prompts: true
          ignore_system_prompts: true
          ignore_tool_prompts: true
          sampling_rate: 1
          llm:
            auth:
              allow_override: false
              param_name: key
              param_value: ${{ env "DECK_GEMINI_API_KEY" }}
              param_location: query
            logging:
              log_payloads: true
              log_statistics: true
            model:
              provider: gemini
              name: ${{ env "DECK_GEMINI_MODEL" }}
              options:
                max_tokens: 5
                temperature: 0.2
                top_p: 1
            route_type: llm/v1/chat
          message_countback: 3
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: lowest-usage
            connect_timeout: 60000
            failover_criteria:
              - error
              - timeout
              - non_idempotent
              - http_429
              - http_502
            hash_on_header: X-Kong-LLM-Request-ID
            latency_strategy: tpot
            read_timeout: 60000
            retries: 1
            slots: 10000
            tokens_count_strategy: llm-accuracy
            write_timeout: 60000
          genai_category: text/generation
          llm_format: openai
          max_request_body_size: 8192
          model_name_header: true
          response_streaming: allow
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
                options:
                  input_cost: 0.30
                  output_cost: 2.50
              weight: 100

