_format_version: "3.0"

plugins:
  - name: opentelemetry
    config:
      traces_endpoint: http://otel-collector:4318/v1/traces
      propagation:
        default_format: w3c
        extract:
          - w3c
          - b3
          - jaeger
          - ot
          - aws
          - datadog
          - gcp
        inject:
          - w3c
      resource_attributes:
        service.name: aa-demo-kong
  - name: post-function
    config:
      access:
        - |
          local function header(name)
            local value = kong.request.get_header(name)
            if value == nil or value == "" then
              return nil
            end
            return value
          end

          local attributes = {
            ["demo.run_id"] = header("x-demo-run-id"),
            ["demo.context_id"] = header("x-demo-context-id"),
            ["a2a.task_id"] = header("x-demo-task-id"),
            ["a2a.message_id"] = header("x-demo-message-id"),
          }

          local function set_attributes(span)
            if not span then
              return
            end
            for key, value in pairs(attributes) do
              if value then
                span:set_attribute(key, value)
              end
            end
          end

          local root_span = kong.tracing.get_root_span and kong.tracing.get_root_span() or nil
          set_attributes(root_span)
          set_attributes(kong.tracing.active_span())
  - name: http-log
    config:
      http_endpoint: http://loki:3100/loki/api/v1/push
      method: POST
      content_type: application/json
      timeout: 10000
      keepalive: 60000
      flush_timeout: 2
      queue:
        concurrency_limit: 1
        initial_retry_delay: 0.01
        max_coalescing_delay: 1
        max_entries: 10000
        max_batch_size: 1
        max_retry_delay: 60
        max_retry_time: 60
      headers: {}
      custom_fields_by_lua:
        streams: >-
          local ts = string.format('%18.0f', os.time() * 1000000000)
          local log_payload = kong.log.serialize()
          local cjson = require 'cjson'
          local service = log_payload['service'] or { name = 'noService' }
          local route = log_payload['route'] or { name = 'noRoute' }
          local consumer = log_payload['consumer'] or {}
          local request = log_payload['request'] or {}
          local request_headers = request['headers'] or {}
          local response = log_payload['response'] or {}
          local status_code = tonumber(response['status'] or 0) or 0
          local status = tostring(status_code)
          local status_class = tostring(math.floor(status_code / 100)) .. 'xx'
          local run_id = tostring(request_headers['x-demo-run-id'] or request_headers['X-Demo-Run-Id'] or '')
          local context_id = tostring(request_headers['x-demo-context-id'] or request_headers['X-Demo-Context-Id'] or '')
          local header_task_id = tostring(request_headers['x-demo-task-id'] or request_headers['X-Demo-Task-Id'] or '')
          local header_message_id = tostring(request_headers['x-demo-message-id'] or request_headers['X-Demo-Message-Id'] or '')
          local component = 'gateway'
          if route['name'] == 'mock-mcp-route' then
            component = 'mcp'
          elseif string.sub(service['name'] or '', 1, 3) == 'ai-' then
            component = 'llm'
          elseif service['name'] == 'orchestrator-service' or service['name'] == 'support-agent-service' or service['name'] == 'success-agent-service' then
            component = 'agent'
          elseif service['name'] == 'mock-api-service' then
            component = 'backend'
          elseif service['name'] == 'ui-service' then
            component = 'ui'
          end
          local ai = log_payload['ai'] or {}
          local mcp = ai['mcp'] or {}
          local mcp_rpc = mcp['rpc'] or {}
          local mcp_entry = mcp_rpc[1] or {}
          local a2a = ai['a2a'] or {}
          local a2a_rpc = a2a['rpc'] or {}
          local a2a_entry = a2a_rpc[1] or {}
          local a2a_payload = a2a_entry['payload'] or {}
          local decoded_a2a_request = nil
          local decoded_a2a_response = nil
          local proxy = ai['proxy'] or {}
          local proxy_payload = proxy['payload'] or {}
          local meta = proxy['meta'] or {}
          local usage = proxy['usage'] or {}
          local cache = proxy['cache'] or {}
          local judge = ai['ai-llm-as-judge'] or {}
          local judge_meta = judge['meta'] or {}
          local judge_usage = judge['usage'] or {}
          local function extract_request_text(messages)
            if type(messages) == 'string' and messages ~= '' then
              local ok, decoded = pcall(cjson.decode, messages)
              if ok and type(decoded) == 'table' then
                messages = decoded['messages'] or messages
              end
            end
            if type(messages) ~= 'table' then
              return ''
            end
            local parts = {}
            for _, message in ipairs(messages) do
              local role = type(message) == 'table' and tostring(message['role'] or '') or ''
              if role ~= 'user' then
                goto continue
              end
              local content = type(message) == 'table' and message['content'] or nil
              if type(content) == 'string' and content ~= '' then
                table.insert(parts, content)
              elseif type(content) == 'table' then
                local nested = {}
                for _, item in ipairs(content) do
                  if type(item) == 'table' and item['type'] == 'text' and item['text'] then
                    table.insert(nested, tostring(item['text']))
                  end
                end
                if #nested > 0 then
                  table.insert(parts, table.concat(nested, ' '))
                end
              end
              ::continue::
            end
            return table.concat(parts, '\n\n')
          end
          local function extract_response_text(response_payload)
            if type(response_payload) == 'string' and response_payload ~= '' then
              local ok, decoded = pcall(cjson.decode, response_payload)
              if ok then
                response_payload = decoded
              end
            end
            if type(response_payload) ~= 'table' then
              return ''
            end
            local choices = response_payload['choices']
            local first = type(choices) == 'table' and choices[1] or nil
            local message = type(first) == 'table' and first['message'] or {}
            local content = type(message) == 'table' and message['content'] or nil
            if type(content) == 'string' then
              return content
            end
            if type(content) == 'table' then
              local nested = {}
              for _, item in ipairs(content) do
                if type(item) == 'table' and item['type'] == 'text' and item['text'] then
                  table.insert(nested, tostring(item['text']))
                end
              end
              return table.concat(nested, ' ')
            end
            return ''
          end
          local function decode_json(value)
            if type(value) == 'table' then
              return value
            end
            if type(value) ~= 'string' or value == '' then
              return nil
            end
            local ok, decoded = pcall(cjson.decode, value)
            if ok and type(decoded) == 'table' then
              return decoded
            end
            return nil
          end
          local function decode_a2a_response(value)
            local decoded = decode_json(value)
            if decoded ~= nil then
              return decoded
            end
            if type(value) ~= 'string' or value == '' then
              return nil
            end
            local last_payload = nil
            for payload in string.gmatch(value, 'data:%s*(.-)\n\n') do
              if payload ~= '' and string.sub(payload, 1, 1) == '{' then
                last_payload = payload
              end
            end
            if last_payload == nil then
              return nil
            end
            return decode_json(last_payload)
          end
          decoded_a2a_request = decode_json(a2a_payload['request'])
          decoded_a2a_response = decode_a2a_response(a2a_payload['response'])
          local a2a_request_params = type(decoded_a2a_request) == 'table' and decoded_a2a_request['params'] or {}
          local a2a_request_message = type(a2a_request_params) == 'table' and a2a_request_params['message'] or {}
          local a2a_response_result = type(decoded_a2a_response) == 'table' and decoded_a2a_response['result'] or {}
          local a2a_response_status = type(a2a_response_result) == 'table' and a2a_response_result['status'] or {}
          local prompt_tokens = tonumber(usage['prompt_tokens'] or usage['input_tokens'] or 0) or 0
          local completion_tokens = tonumber(usage['completion_tokens'] or usage['output_tokens'] or 0) or 0
          local total_tokens = tonumber(usage['total_tokens'] or (prompt_tokens + completion_tokens) or 0) or 0
          local provider_name = tostring(meta['provider_name'] or '')
          local model_name = tostring(meta['response_model'] or meta['request_model'] or '')
          local prompt_cost = 0
          local completion_cost = 0
          local usage_cost = tonumber(usage['cost'])
          if provider_name == 'openai' and string.find(model_name, 'gpt-4o-mini', 1, true) then
            prompt_cost = (prompt_tokens * 0.15) / 1000000
            completion_cost = (completion_tokens * 0.60) / 1000000
          elseif provider_name == 'gemini' and string.find(model_name, 'gemini-2.5-flash', 1, true) then
            prompt_cost = (prompt_tokens * 0.30) / 1000000
            completion_cost = (completion_tokens * 2.50) / 1000000
          end
          if usage_cost == nil or usage_cost <= 0 then
            usage_cost = prompt_cost + completion_cost
          end
          log_payload['llm_usage'] = {
            provider_name = provider_name,
            request_model = tostring(meta['request_model'] or ''),
            response_model = tostring(meta['response_model'] or ''),
            prompt_tokens = prompt_tokens,
            completion_tokens = completion_tokens,
            total_tokens = total_tokens,
            prompt_cost = prompt_cost,
            completion_cost = completion_cost,
            cost = usage_cost,
            time_per_token = usage['time_per_token'],
            time_to_first_token = usage['time_to_first_token'],
          }
          log_payload['llm_usage_prompt_tokens'] = prompt_tokens
          log_payload['llm_usage_completion_tokens'] = completion_tokens
          log_payload['llm_usage_total_tokens'] = total_tokens
          log_payload['llm_usage_prompt_cost'] = prompt_cost
          log_payload['llm_usage_completion_cost'] = completion_cost
          log_payload['llm_usage_cost'] = usage_cost
          log_payload['llm_usage_model'] = model_name
          log_payload['llm_usage_provider'] = provider_name
          log_payload['llm_latency_ms'] = tonumber(meta['llm_latency'] or 0) or 0
          log_payload['ai_cache_status'] = tostring(cache['cache_status'] or '')
          log_payload['ai_cache_fetch_latency'] = tonumber(cache['fetch_latency'] or 0) or 0
          log_payload['ai_cache_embeddings_provider'] = tostring(cache['embeddings_provider'] or '')
          log_payload['ai_cache_embeddings_model'] = tostring(cache['embeddings_model'] or '')
          log_payload['ai_cache_embeddings_latency'] = tonumber(cache['embeddings_latency'] or 0) or 0
          log_payload['judge_input'] = extract_request_text(proxy_payload['request'] or {})
          log_payload['judge_output'] = extract_response_text(proxy_payload['response'] or {})
          log_payload['judge_inference_model'] = tostring(meta['response_model'] or meta['request_model'] or '')
          log_payload['judge_model'] = tostring(judge_meta['response_model'] or '')
          log_payload['judge_provider'] = tostring(judge_meta['provider_name'] or '')
          log_payload['judge_latency_ms'] = tonumber(judge_meta['llm_latency'] or 0) or 0
          log_payload['judge_accuracy'] = tonumber(usage['llm_accuracy'] or judge_usage['llm_accuracy'] or 0) or 0
          log_payload['run_id'] = run_id
          log_payload['service_name_extracted'] = tostring(service['name'] or '')
          log_payload['route_name_extracted'] = tostring(route['name'] or '')
          log_payload['consumer_username'] = tostring(consumer['username'] or consumer['custom_id'] or consumer['id'] or 'anonymous')
          log_payload['request_uri'] = tostring(request['uri'] or '')
          log_payload['response_status'] = tonumber(response['status'] or 0) or 0
          log_payload['mcp_session_id'] = tostring(mcp['mcp_session_id'] or '')
          log_payload['mcp_method'] = tostring(mcp_entry['method'] or '')
          log_payload['mcp_tool_name'] = tostring(mcp_entry['tool_name'] or '')
          log_payload['mcp_tool_latency'] = tonumber(mcp_entry['latency'] or 0) or 0
          log_payload['mcp_response_body_size'] = tonumber(mcp_entry['response_body_size'] or 0) or 0
          log_payload['a2a_id'] = tostring(a2a_entry['id'] or (type(decoded_a2a_request) == 'table' and decoded_a2a_request['id']) or '')
          log_payload['a2a_binding'] = tostring(a2a_entry['binding'] or '')
          log_payload['a2a_context_id'] = tostring(a2a_entry['context_id'] or a2a_payload['context_id'] or context_id or '')
          log_payload['a2a_task_id'] = tostring(
            a2a_entry['task_id']
            or (type(a2a_request_params) == 'table' and (a2a_request_params['task_id'] or a2a_request_params['taskId']))
            or (type(a2a_response_result) == 'table' and (a2a_response_result['id'] or a2a_response_result['taskId']))
            or a2a_payload['task_id']
            or ''
          )
          local decoded_task_state = type(a2a_response_status) == 'table' and a2a_response_status['state'] or nil
          local plugin_task_state = a2a_entry['task_state']
          local terminal_task_states = {
            completed = true,
            failed = true,
            canceled = true,
            rejected = true,
            ['auth-required'] = true,
          }
          log_payload['a2a_task_state'] = tostring(
            (terminal_task_states[tostring(decoded_task_state or '')] and decoded_task_state)
            or plugin_task_state
            or decoded_task_state
            or ''
          )
          log_payload['a2a_message_id'] = tostring(
            a2a_entry['message_id']
            or (type(a2a_request_message) == 'table' and (a2a_request_message['messageId'] or a2a_request_message['message_id']))
            or header_message_id
            or a2a_payload['message_id']
            or ''
          )
          log_payload['a2a_method'] = tostring(a2a_entry['method'] or '')
          log_payload['a2a_latency'] = tonumber(a2a_entry['latency'] or 0) or 0
          log_payload['a2a_response_body_size'] = tonumber(a2a_entry['response_body_size'] or 0) or 0
          log_payload['a2a_streaming'] = a2a_entry['streaming'] == true
          log_payload['a2a_ttfb_latency'] = tonumber(a2a_entry['ttfb_latency'] or 0) or 0
          log_payload['a2a_sse_events_count'] = tonumber(a2a_entry['sse_events_count'] or 0) or 0
          log_payload['a2a_request_body'] = a2a_payload['request'] or a2a_entry['request'] or log_payload['request']
          log_payload['a2a_response_body'] = a2a_payload['response'] or a2a_entry['response'] or log_payload['response']
          log_payload['request_id_extracted'] = tostring(
            (type(log_payload['request']) == 'table' and log_payload['request']['id'])
            or (type(log_payload['response']) == 'table' and (
              log_payload['response']['request_id']
              or (type(log_payload['response']['headers']) == 'table' and (
                log_payload['response']['headers']['x-kong-request-id']
                or log_payload['response']['headers']['X-Kong-Request-Id']
              ))
            ))
            or ''
          )
          log_payload['task_id_extracted'] = tostring(log_payload['a2a_task_id'] ~= '' and log_payload['a2a_task_id'] or header_task_id)
          log_payload['message_id_extracted'] = tostring(log_payload['a2a_message_id'] ~= '' and log_payload['a2a_message_id'] or log_payload['a2a_id'] ~= '' and log_payload['a2a_id'] or header_message_id)
          local task_stage = ''
          local task_stage_detail = ''
          if log_payload['a2a_method'] == 'agent/getCard' then
            task_stage = 'discovered'
            task_stage_detail = 'agent card discovery'
          elseif log_payload['a2a_method'] == 'tasks/get' then
            task_stage = tostring(log_payload['a2a_task_state'] ~= '' and log_payload['a2a_task_state'] or 'working')
            task_stage_detail = 'tasks/get'
          elseif log_payload['a2a_method'] == 'message/send' then
            task_stage = tostring(log_payload['a2a_task_state'] ~= '' and log_payload['a2a_task_state'] or 'submitted')
            task_stage_detail = 'message/send'
          elseif log_payload['mcp_method'] == 'initialize' then
            task_stage = 'working'
            task_stage_detail = 'mcp initialize'
          elseif log_payload['mcp_method'] == 'notifications/initialized' then
            task_stage = 'working'
            task_stage_detail = 'mcp initialized'
          elseif log_payload['mcp_method'] == 'tools/list' then
            task_stage = 'working'
            task_stage_detail = 'mcp tools/list'
          elseif log_payload['mcp_method'] == 'tools/call' then
            task_stage = 'working'
            task_stage_detail = 'mcp tools/call ' .. tostring(log_payload['mcp_tool_name'] or '')
          elseif component == 'llm' and header_task_id ~= '' then
            task_stage = 'working'
            task_stage_detail = 'llm'
          elseif component == 'llm' then
            task_stage = 'planning'
            task_stage_detail = 'llm planning'
          end
          log_payload['task_stage'] = task_stage
          log_payload['task_stage_detail'] = task_stage_detail
          if log_payload['a2a_method'] ~= '' then
            log_payload['trace_event_type'] = 'a2a'
            log_payload['trace_operation'] = log_payload['a2a_method']
            log_payload['trace_subject'] = tostring(log_payload['a2a_message_id'] ~= '' and log_payload['a2a_message_id'] or log_payload['a2a_id'])
            log_payload['trace_latency_ms'] = log_payload['a2a_latency']
          elseif log_payload['mcp_method'] ~= '' then
            log_payload['trace_event_type'] = 'mcp'
            log_payload['trace_operation'] = log_payload['mcp_method']
            log_payload['trace_subject'] = tostring(log_payload['mcp_tool_name'] or '')
            log_payload['trace_latency_ms'] = log_payload['mcp_tool_latency']
          else
            log_payload['trace_event_type'] = component
            log_payload['trace_operation'] = tostring(component == 'llm' and 'chat/completions' or request['uri'] or '')
            log_payload['trace_subject'] = ''
            log_payload['trace_latency_ms'] = tonumber(meta['llm_latency'] or 0) or 0
          end
          local payload_string = cjson.encode(log_payload)
          return {
            {
              stream = {
                gateway = 'kong-unified-governance',
                component = component,
                service = tostring(service['name'] or 'noService'),
                route = tostring(route['name'] or 'noRoute'),
                consumer = tostring(consumer['username'] or consumer['custom_id'] or consumer['id'] or 'anonymous'),
                method = tostring(request['method'] or 'UNKNOWN'),
                status = status,
                status_class = status_class,
                run_id = run_id,
                context_id = context_id,
                task_id = header_task_id,
                message_id = header_message_id,
                mcp_method = tostring(mcp_entry['method'] or ''),
                mcp_tool_name = tostring(mcp_entry['tool_name'] or ''),
              },
              values = {
                { ts, payload_string }
              }
            }
          }

services:
  - name: ui-service
    url: http://ui:80
    routes:
      - name: ui-route
        paths:
          - /
        strip_path: false

  - name: ai-orchestrator-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-chat-route
        paths:
          - /ai/orchestrator/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            retries: 1
            failover_criteria:
              - error
              - timeout
              - http_404
              - non_idempotent
              - http_403
              - http_429
              - http_502
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
                options:
                  input_cost: 0.30
                  output_cost: 2.50
                  upstream_url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
              weight: 50

  - name: ai-orchestrator-failover-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-failover-demo-chat-route
        paths:
          - /ai/orchestrator-failover-demo/chat/completions
        strip_path: false
        methods:
          - POST
      - name: ai-orchestrator-failover-simulator-route
        paths:
          - /llm-failure-simulator
        strip_path: false
        methods:
          - POST
        plugins:
          - name: request-termination
            config:
              status_code: 503
              message: Simulated primary LLM outage
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            connect_timeout: 60000
            fail_timeout: 10000
            failover_criteria:
              - error
              - http_403
              - http_404
              - http_429
              - http_500
              - http_502
              - http_503
              - http_504
              - invalid_header
              - non_idempotent
              - timeout
            hash_on_header: X-Kong-LLM-Request-ID
            latency_strategy: tpot
            max_fails: 3
            read_timeout: 60000
            retries: 3
            slots: 10000
            tokens_count_strategy: total-tokens
            write_timeout: 60000
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
                  upstream_url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
                options:
                  input_cost: 0.30
                  output_cost: 2.50
              weight: 50

  - name: ai-orchestrator-token-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-token-demo-chat-route
        paths:
          - /ai/orchestrator-token-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: true
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  input_cost: 0.15
                  output_cost: 0.60
      - name: ai-rate-limiting-advanced
        config:
          llm_providers:
            - name: openai
              limit:
                - 1
              window_size:
                - 300

  - name: ai-orchestrator-prompt-enhance-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-prompt-enhance-demo-chat-route
        paths:
          - /ai/orchestrator-prompt-enhance-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-prompt-decorator
        config:
          prompts:
            prepend:
              - role: system
                content: You are responding under AI governance enforced by Kong Gateway.
              - role: system
