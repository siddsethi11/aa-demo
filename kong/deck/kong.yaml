_format_version: "3.0"

plugins:
  - name: http-log
    config:
      http_endpoint: http://loki:3100/loki/api/v1/push
      method: POST
      content_type: application/json
      timeout: 10000
      keepalive: 60000
      flush_timeout: 2
      queue:
        concurrency_limit: 1
        initial_retry_delay: 0.01
        max_coalescing_delay: 1
        max_entries: 10000
        max_batch_size: 1
        max_retry_delay: 60
        max_retry_time: 60
      headers: {}
      custom_fields_by_lua:
        streams: >-
          local ts = string.format('%18.0f', os.time() * 1000000000)
          local log_payload = kong.log.serialize()
          local service = log_payload['service'] or { name = 'noService' }
          local route = log_payload['route'] or { name = 'noRoute' }
          local consumer = log_payload['consumer'] or {}
          local request = log_payload['request'] or {}
          local response = log_payload['response'] or {}
          local status_code = tonumber(response['status'] or 0) or 0
          local status = tostring(status_code)
          local status_class = tostring(math.floor(status_code / 100)) .. 'xx'
          local component = 'gateway'
          if route['name'] == 'mock-mcp-route' then
            component = 'mcp'
          elseif string.sub(service['name'] or '', 1, 3) == 'ai-' then
            component = 'llm'
          elseif service['name'] == 'orchestrator-service' or service['name'] == 'support-agent-service' or service['name'] == 'success-agent-service' then
            component = 'agent'
          elseif service['name'] == 'mock-api-service' then
            component = 'backend'
          elseif service['name'] == 'ui-service' then
            component = 'ui'
          end
          local ai = log_payload['ai'] or {}
          local proxy = ai['proxy'] or {}
          local meta = proxy['meta'] or {}
          local usage = proxy['usage'] or {}
          local prompt_tokens = tonumber(usage['prompt_tokens'] or usage['input_tokens'] or 0) or 0
          local completion_tokens = tonumber(usage['completion_tokens'] or usage['output_tokens'] or 0) or 0
          local total_tokens = tonumber(usage['total_tokens'] or (prompt_tokens + completion_tokens) or 0) or 0
          log_payload['llm_usage'] = {
            provider_name = tostring(meta['provider_name'] or ''),
            request_model = tostring(meta['request_model'] or ''),
            response_model = tostring(meta['response_model'] or ''),
            prompt_tokens = prompt_tokens,
            completion_tokens = completion_tokens,
            total_tokens = total_tokens,
            cost = usage['cost'],
            time_per_token = usage['time_per_token'],
            time_to_first_token = usage['time_to_first_token'],
          }
          log_payload['llm_usage_prompt_tokens'] = prompt_tokens
          log_payload['llm_usage_completion_tokens'] = completion_tokens
          log_payload['llm_usage_total_tokens'] = total_tokens
          log_payload['llm_usage_model'] = tostring(meta['response_model'] or meta['request_model'] or '')
          log_payload['llm_usage_provider'] = tostring(meta['provider_name'] or '')
          local cjson = require 'cjson'
          local payload_string = cjson.encode(log_payload)
          return {
            {
              stream = {
                gateway = 'kong-unified-governance',
                component = component,
                service = tostring(service['name'] or 'noService'),
                route = tostring(route['name'] or 'noRoute'),
                consumer = tostring(consumer['username'] or consumer['custom_id'] or consumer['id'] or 'anonymous'),
                method = tostring(request['method'] or 'UNKNOWN'),
                status = status,
                status_class = status_class,
              },
              values = {
                { ts, payload_string }
              }
            }
          }

services:
  - name: ui-service
    url: http://ui:80
    routes:
      - name: ui-route
        paths:
          - /
        strip_path: false

  - name: ai-orchestrator-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-chat-route
        paths:
          - /ai/orchestrator/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            retries: 1
            failover_criteria:
              - error
              - timeout
              - non_idempotent
              - http_429
              - http_502
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
              weight: 50

  - name: ai-orchestrator-failover-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-failover-demo-chat-route
        paths:
          - /ai/orchestrator-failover-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          balancer:
            algorithm: priority
            retries: 1
            failover_criteria:
              - error
              - timeout
              - non_idempotent
              - http_429
              - http_502
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer invalid-failover-demo-key
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
              weight: 100
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}
              weight: 50

  - name: ai-orchestrator-token-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-token-demo-chat-route
        paths:
          - /ai/orchestrator-token-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini
      - name: ai-rate-limiting-advanced
        config:
          llm_providers:
            - name: openai
              limit:
                - 1
              window_size:
                - 300

  - name: ai-orchestrator-prompt-enhance-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-prompt-enhance-demo-chat-route
        paths:
          - /ai/orchestrator-prompt-enhance-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-prompt-decorator
        config:
          prompts:
            prepend:
              - role: system
                content: You are responding under AI governance enforced by Kong Gateway.
              - role: system
                content: >-
                  Enhanced escalation policy for this demo:
                  1) Respond in an executive escalation format with sections for Situation, Risk, Actions, and Next Checkpoint.
                  2) State customer posture explicitly and keep the tone enterprise-safe.
                  3) Mention regulatory or data residency considerations when they are relevant.
                  4) End with a confidence score and a named owner.
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-orchestrator-semantic-guard-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-semantic-guard-demo-chat-route
        paths:
          - /ai/orchestrator-semantic-guard-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-semantic-prompt-guard
        config:
          embeddings:
            auth:
              header_name: Authorization
              header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
            model:
              provider: openai
              name: text-embedding-3-small
          search:
            threshold: 0.5
          vectordb:
            strategy: redis
            distance_metric: cosine
            threshold: 0.2
            dimensions: 1024
            redis:
              host: ${{ env "DECK_REDIS_HOST" }}
              port: 6379
          rules:
            match_all_conversation_history: true
            deny_prompts:
              - Requests to reveal employee personal contact information or private customer data
              - Requests to disclose internal credentials, access instructions, or confidential system details
              - Requests to bypass security controls or reveal private infrastructure information
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-orchestrator-semantic-cache-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-semantic-cache-demo-chat-route
        paths:
          - /ai/orchestrator-semantic-cache-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-semantic-cache
        config:
          embeddings:
            auth:
              header_name: Authorization
              header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
            model:
              provider: openai
              name: text-embedding-3-small
              options:
                upstream_url: https://api.openai.com/v1/embeddings
          vectordb:
            dimensions: 1024
            distance_metric: cosine
            strategy: redis
            threshold: 0.1
            redis:
              host: ${{ env "DECK_REDIS_HOST" }}
              port: 6379
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-orchestrator-pii-placeholder-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-pii-placeholder-demo-chat-route
        paths:
          - /ai/orchestrator-pii-placeholder-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-sanitizer
        config:
          anonymize:
            - all_and_credentials
          sanitization_mode: BOTH
          host: ai-pii-service
          port: 8080
          redact_type: placeholder
          recover_redacted: false
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-orchestrator-pii-synthetic-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-pii-synthetic-demo-chat-route
        paths:
          - /ai/orchestrator-pii-synthetic-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-sanitizer
        config:
          anonymize:
            - all_and_credentials
          sanitization_mode: BOTH
          host: ai-pii-service
          port: 8080
          redact_type: synthetic
          recover_redacted: false
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-orchestrator-pii-block-demo-service
    url: https://api.openai.com
    routes:
      - name: ai-orchestrator-pii-block-demo-chat-route
        paths:
          - /ai/orchestrator-pii-block-demo/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-sanitizer
        config:
          anonymize:
            - all_and_credentials
          sanitization_mode: BOTH
          host: ai-pii-service
          port: 8080
          redact_type: placeholder
          block_if_detected: true
          recover_redacted: false
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: openai
                name: gpt-4o-mini

  - name: ai-subagent-service
    url: https://generativelanguage.googleapis.com
    routes:
      - name: ai-subagent-chat-route
        paths:
          - /ai/subagent/chat/completions
        strip_path: false
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                param_name: key
                param_value: ${{ env "DECK_GEMINI_API_KEY" }}
                param_location: query
              logging:
                log_payloads: false
                log_statistics: true
              model:
                provider: gemini
                name: ${{ env "DECK_GEMINI_MODEL" }}

  - name: orchestrator-service
    url: http://orchestrator:8000
    routes:
      - name: orchestrator-route
        paths:
          - /orchestrator
        strip_path: true
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: support-agent-service
    url: http://support-agent:8000
    routes:
      - name: support-agent-route
        paths:
          - /support-agent
        strip_path: true
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: success-agent-service
    url: http://success-agent:8000
    routes:
      - name: success-agent-route
        paths:
          - /success-agent
        strip_path: true
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: mock-api-service
    url: http://mock-api:8000
    routes:
      - name: mock-api-route
        paths:
          - /api
        strip_path: true
      - name: mock-mcp-route
        paths:
          - /mock-mcp
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
          - name: ai-mcp-proxy
            config:
              mode: conversion-listener
              include_consumer_groups: true
              server:
                timeout: 10000
              max_request_body_size: 8192
              tools:
                - name: get_customer_account
                  description: Get account metadata and current health signals
                  method: GET
                  path: /api/customers/{customer_id}
                  annotations:
                    title: Customer Account
                  parameters:
                    - name: customer_id
                      in: path
                      required: true
                      schema:
                        type: string
                      description: Customer ID
                  acl:
                    allow:
                      - orchestrator-tools
                - name: get_renewal_risk
                  description: Get renewal risk and contributing factors
                  method: GET
                  path: /api/customers/{customer_id}/renewal-risk
                  annotations:
                    title: Renewal Risk
                  parameters:
                    - name: customer_id
                      in: path
                      required: true
                      schema:
                        type: string
                      description: Customer ID
                  acl:
                    allow:
                      - orchestrator-tools
                - name: get_open_tickets
                  description: Get open support tickets for the customer
                  method: GET
                  path: /api/customers/{customer_id}/tickets
                  annotations:
                    title: Open Tickets
                  parameters:
                    - name: customer_id
                      in: path
                      required: true
                      schema:
                        type: string
                      description: Customer ID
                  acl:
                    allow:
                      - orchestrator-tools
                - name: get_incident_status
                  description: Get current incident status and impact
                  method: GET
                  path: /api/incidents/{incident_id}
                  annotations:
                    title: Incident Status
                  parameters:
                    - name: incident_id
                      in: path
                      required: true
                      schema:
                        type: string
                      description: Incident ID
                  acl:
                    allow:
                      - support-tools
                - name: search_runbook
                  description: Search operational runbooks
                  method: GET
                  path: /api/runbooks/search
                  annotations:
                    title: Runbook Search
                  parameters:
                    - name: q
                      in: query
                      required: true
                      schema:
                        type: string
                      description: Search query
                  acl:
                    allow:
                      - support-tools
                - name: draft_customer_reply
                  description: Draft a customer-facing reply
                  method: GET
                  path: /api/drafts/customer-reply/preview
                  annotations:
                    title: Draft Customer Reply
                  parameters:
                    - name: account_name
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: csm
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: issue_summary
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: renewal_risk
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: technical_summary
                      in: query
                      required: true
                      schema:
                        type: string
                  acl:
                    allow:
                      - success-tools
                - name: create_followup_task
                  description: Create a success-team follow-up task
                  method: GET
                  path: /api/tasks/followup/preview
                  annotations:
                    title: Create Follow-up Task
                  parameters:
                    - name: account_name
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: owner
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: due_date
                      in: query
                      required: true
                      schema:
                        type: string
                    - name: action_items
                      in: query
                      required: false
                      schema:
                        type: string
                  acl:
                    allow:
                      - success-tools

consumers:
  - username: orchestrator-agent
    groups:
      - name: orchestrator-tools
    keyauth_credentials:
      - key: orchestrator-demo-key
  - username: support-agent
    groups:
      - name: support-tools
    keyauth_credentials:
      - key: support-demo-key
  - username: success-agent
    groups:
      - name: success-tools
    keyauth_credentials:
      - key: success-demo-key
  - username: ui-client
    keyauth_credentials:
      - key: ui-demo-key

consumer_groups:
  - name: orchestrator-tools
  - name: support-tools
  - name: success-tools
