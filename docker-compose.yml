services:
  redis-stack:
    image: redis/redis-stack-server:7.4.0-v6
    container_name: redis-stack
    restart: unless-stopped
    expose:
      - "6379"

  ai-pii-service:
    image: docker.cloudsmith.io/kong/ai-pii/service:v0.1.4-en
    platform: linux/amd64
    container_name: ai-pii-service
    restart: unless-stopped
    expose:
      - "8080"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    expose:
      - "4317"
      - "4318"
      - "5778"
      - "9411"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.139.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    expose:
      - "4318"
      - "9464"
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started

  opik-mysql:
    image: mysql:8.4.2
    container_name: opik-mysql
    profiles: ["opik"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      timeout: 1s
      interval: 1s
      retries: 300

  opik-redis:
    image: redis:7.2.4-alpine3.19
    container_name: opik-redis
    profiles: ["opik"]
    restart: unless-stopped
    command: redis-server --requirepass opik
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 2s
      timeout: 4s
      retries: 20
      start_period: 30s

  opik-clickhouse-init:
    image: alpine:latest
    container_name: opik-clickhouse-init
    profiles: ["opik"]
    command: >
      sh -c "cp -r /clickhouse_config_files/* /config/ &&
      chown -R 1000:1000 /config"
    volumes:
      - ./observability/opik/clickhouse_config:/clickhouse_config_files:ro
      - opik-clickhouse-config:/config

  opik-zookeeper:
    image: zookeeper:3.9.4
    container_name: opik-zookeeper
    profiles: ["opik"]
    restart: unless-stopped
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /bitnami/zookeeper/data
        chown -R zookeeper:zookeeper /bitnami/zookeeper
        exec gosu zookeeper /docker-entrypoint.sh zkServer.sh start-foreground
    environment:
      JVMFLAGS: "-Xmx512m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOO_DATA_DIR: /bitnami/zookeeper/data
      ZOO_DATA_LOG_DIR: /bitnami/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 1s
      timeout: 1s
      retries: 300

  opik-clickhouse:
    image: clickhouse/clickhouse-server:25.3.6.56
    platform: linux/amd64
    container_name: opik-clickhouse
    profiles: ["opik"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 1s
      timeout: 1s
      retries: 300
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      opik-zookeeper:
        condition: service_healthy
      opik-clickhouse-init:
        condition: service_completed_successfully
    volumes:
      - opik-clickhouse:/var/lib/clickhouse/
      - opik-clickhouse-server:/var/log/clickhouse-server/
      - opik-clickhouse-config:/etc/clickhouse-server/config.d

  opik-minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: opik-minio
    profiles: ["opik"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      MINIO_ROOT_PASSWORD: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
    command: server --console-address ":9090" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 10s
      retries: 30
      start_period: 5s

  opik-mc:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: opik-mc
    profiles: ["opik"]
    depends_on:
      opik-minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 10s;
      /usr/bin/mc alias set s3 http://opik-minio:9000 ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE} ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY} --api S3v4 ;
      /usr/bin/mc mb --ignore-existing s3/public;
      /usr/bin/mc anonymous set download s3/public/;
      "

  opik-backend:
    image: ghcr.io/comet-ml/opik/opik-backend:latest
    container_name: opik-backend
    profiles: ["opik"]
    restart: unless-stopped
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    environment:
      DOCKER_BUILDKIT: 1
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "opik-mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://opik-clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "opik-clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      JAVA_OPTS: "-Dliquibase.propertySubstitutionEnabled=true -XX:+UseG1GC -XX:MaxRAMPercentage=80.0"
      REDIS_URL: redis://:opik@opik-redis:6379/
      OPIK_OTEL_SDK_ENABLED: false
      OTEL_VERSION: 2.16.0
      OTEL_PROPAGATORS: "tracecontext,baggage,b3"
      OTEL_EXPERIMENTAL_EXPORTER_OTLP_RETRY_ENABLED: true
      OTEL_EXPORTER_OTLP_METRICS_DEFAULT_HISTOGRAM_AGGREGATION: BASE2_EXPONENTIAL_BUCKET_HISTOGRAM
      OTEL_EXPERIMENTAL_RESOURCE_DISABLED_KEYS: process.command_args
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: delta
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OPIK_USAGE_REPORT_ENABLED: false
      AWS_ACCESS_KEY_ID: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      AWS_SECRET_ACCESS_KEY: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      IS_MINIO: true
      S3_URL: http://opik-minio:9000
      PYTHON_EVALUATOR_URL: http://opik-python-backend:8000
      TOGGLE_OPIK_AI_ENABLED: "false"
      TOGGLE_GUARDRAILS_ENABLED: "false"
      TOGGLE_WELCOME_WIZARD_ENABLED: "true"
      TOGGLE_RUNNERS_ENABLED: "false"
      CORS: "false"
      ATTACHMENTS_STRIP_MIN_SIZE: "256000"
      JACKSON_MAX_STRING_LENGTH: "104857600"
    expose:
      - "8080"
      - "3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health-check"]
      interval: 1s
      timeout: 600s
      retries: 600
      start_period: 1s
    depends_on:
      opik-mysql:
        condition: service_healthy
      opik-clickhouse:
        condition: service_healthy
      opik-minio:
        condition: service_healthy
      opik-redis:
        condition: service_healthy
    tmpfs:
      - /tmp

  opik-python-backend:
    image: ghcr.io/comet-ml/opik/opik-python-backend:latest
    container_name: opik-python-backend
    profiles: ["opik"]
    restart: unless-stopped
    privileged: true
    environment:
      OPIK_OTEL_SDK_ENABLED: false
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_VERSION: 2.16.0
      PYTHON_CODE_EXECUTOR_IMAGE_TAG: latest
      PYTHON_CODE_EXECUTOR_STRATEGY: process
      PYTHON_CODE_EXECUTOR_CONTAINERS_NUM: 5
      PYTHON_CODE_EXECUTOR_EXEC_TIMEOUT_IN_SECS: 3
      PYTHON_CODE_EXECUTOR_ALLOW_NETWORK: "false"
      PYTHON_CODE_EXECUTOR_CPU_SHARES: 512
      PYTHON_CODE_EXECUTOR_MEM_LIMIT: "256m"
      OPIK_VERSION: latest
      OPIK_REVERSE_PROXY_URL: http://opik-frontend:5173/api
      PYTHON_BACKEND_PORT: "8000"
      REDIS_URL: redis://:opik@opik-redis:6379/0
      RQ_WORKER_ENABLED: "true"
      OPTSTUDIO_MAX_CONCURRENT_JOBS: "5"
      OPTSTUDIO_LOG_LEVEL: INFO
      OPTSTUDIO_LLM_MAX_TOKENS: "8192"
      RQ_WORKER_TTL_FAILURE: "86400"
      OPIK_URL_OVERRIDE: http://opik-backend:8080
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --spider --quiet http://127.0.0.1:$${PYTHON_BACKEND_PORT:-8000}/healthcheck"]
      interval: 2s
      timeout: 60s
      retries: 30
      start_period: 2s
    tmpfs:
      - /var/lib/docker

  opik-frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:latest
    container_name: opik-frontend
    profiles: ["opik"]
    restart: unless-stopped
    ports:
      - "${OPIK_FRONTEND_PORT:-5173}:5173"
    environment:
      OPIK_VERSION: latest
      NGINX_PORT: "5173"
      NGINX_CONF_SUFFIX: local
      OTEL_TRACE: "off"
      OTEL_COLLECTOR_HOST: otel-collector
      OTEL_COLLECTOR_PORT: "4318"
    volumes:
      - ./observability/opik/nginx_default_local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --fail-early http://localhost:5173/health"]
      interval: 1s
      timeout: 30s
      retries: 10
      start_period: 1s

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/kong-governance-overview.json
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started

  kong-dp:
    image: kong/kong-gateway:3.14.0.1
    container_name: kong-dp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KONG_ROLE: data_plane
      KONG_DATABASE: "off"
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
      KONG_CLUSTER_MTLS: pki
      KONG_CLUSTER_CONTROL_PLANE: ${KONG_CLUSTER_CONTROL_PLANE}
      KONG_CLUSTER_SERVER_NAME: ${KONG_CLUSTER_SERVER_NAME}
      KONG_CLUSTER_TELEMETRY_ENDPOINT: ${KONG_CLUSTER_TELEMETRY_ENDPOINT}
      KONG_CLUSTER_TELEMETRY_SERVER_NAME: ${KONG_CLUSTER_TELEMETRY_SERVER_NAME}
      KONG_CLUSTER_CERT: /etc/kong/certs/tls.crt
      KONG_CLUSTER_CERT_KEY: /etc/kong/certs/tls.key
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_KONNECT_MODE: "on"
      KONG_VITALS: "off"
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_LOG_LEVEL: notice
      KONG_PLUGINS: bundled,trace-enricher
      KONG_UNTRUSTED_LUA: "on"
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: resty.http,cjson
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8100:8100"
    volumes:
      - ./kong/certs:/etc/kong/certs:ro
      - ./kong/plugins/trace-enricher:/usr/local/share/lua/5.1/kong/plugins/trace-enricher:ro
    depends_on:
      jaeger:
        condition: service_started
      loki:
        condition: service_started
      redis-stack:
        condition: service_started
      ai-pii-service:
        condition: service_started
      orchestrator:
        condition: service_started
      support-agent:
        condition: service_started
      success-agent:
        condition: service_started
      mock-api:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: orchestrator
    command: ["uvicorn", "services.orchestrator.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PORT: "8000"
      KONG_PROXY_URL: http://kong-dp:8000
      KONG_AI_PROXY_URL: http://kong-dp:8000/ai/orchestrator
      AGENT_API_KEY: orchestrator-demo-key
      TRACE_WS_PATH: /trace
      OPENAI_MODEL: gpt-4o-mini
      OBSERVABILITY_COMPOSE_DIR: ${PWD}
      OBSERVABILITY_COMPOSE_PROJECT_NAME: aa-demo
      OBSERVABILITY_COMPOSE_FILE: docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}:ro

  support-agent:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: support-agent
    command: ["uvicorn", "services.support_agent.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PORT: "8000"
      KONG_MCP_URL: http://kong-dp:8000/mock-mcp
      KONG_AI_PROXY_URL: http://kong-dp:8000/ai/subagent
      AGENT_API_KEY: support-demo-key
      OPENAI_MODEL: gemini-2.5-flash

  success-agent:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: success-agent
    command: ["uvicorn", "services.success_agent.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PORT: "8000"
      KONG_MCP_URL: http://kong-dp:8000/mock-mcp
      KONG_AI_PROXY_URL: http://kong-dp:8000/ai/subagent
      AGENT_API_KEY: success-demo-key
      OPENAI_MODEL: gemini-2.5-flash

  mock-api:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: mock-api
    command: ["uvicorn", "services.mock_api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PORT: "8000"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: ui
    ports:
      - "3000:80"

volumes:
  opik-clickhouse:
  opik-clickhouse-server:
  opik-clickhouse-config:
