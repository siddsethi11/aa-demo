policies.loadBalancing.intro.failover: "Kong tries the primary OpenAI path first, then fails over to Gemini when that path is configured to fail."
policies.loadBalancing.intro.semantic: "Kong semantically routes the prompt to the most relevant model target before any provider call is made."
policies.loadBalancing.plainEnglish.failover:
  - "The orchestrator makes one focused probe request through Kong."
  - "Kong sends that request to the primary OpenAI target first."
  - "When the primary path fails, Kong retries using the Gemini fallback target and returns the fallback result."
policies.loadBalancing.plainEnglish.semantic:
  - "The orchestrator makes one focused probe request through Kong."
  - "Kong embeds the prompt and compares it with the target descriptions stored for the semantic balancer."
  - "Kong then sends the request to the best-fit model target and returns that result directly."
policies.loadBalancing.promptPreset.creative: "Creative / Marketing"
policies.loadBalancing.promptPreset.support: "Support / Operational"
policies.loadBalancing.title: "Load Balancing"
policies.loadBalancing.why.failover: "It shows model resilience at the gateway layer instead of in application code."
policies.loadBalancing.why.semantic: "It shows prompt-aware model routing at the gateway layer instead of hard-coding model choice in application logic."
policies.normal.config:
  - ["UI access", "Key-auth using the UI consumer key"]
  - ["Agent-to-agent", "AI A2A Proxy handles discovery and message/stream execution"]
  - ["Tool exposure", "AI MCP Proxy exposes only the allowed tools per consumer group"]
  - ["Orchestrator LLM route", "AI Proxy Advanced to OpenAI 4o mini"]
  - ["Sub-agent LLM route", "AI Proxy Advanced to Gemini 2.5 Flash"]
policies.normal.intro: "This is the baseline multi-agent flow: Kong fronts the full orchestration path, including MCP tool access, A2A discovery and execution, and model routing."
policies.normal.plainEnglish:
  - "The UI sends one escalation request through Kong to the orchestrator."
  - "Kong handles sub-agent discovery and handoff through A2A, so the orchestrator never talks to the agents directly."
  - "Kong exposes the mock REST API as MCP tools, so the orchestrator and sub-agents call governed tools instead of raw endpoints."
  - "Kong routes orchestrator LLM traffic to OpenAI and sub-agent LLM traffic to Gemini, then returns one final escalation brief."
policies.normal.title: "Normal"
policies.normal.why: "It is the reference path for the rest of the governance scenarios."
policies.piiSanitizer.intro: "Kong sanitizes sensitive data before it leaves the gateway and sanitizes the model response before it returns to the UI."
policies.piiSanitizer.plainEnglish:
  - "Kong inspects the prompt before the model call and the response before it returns to the UI."
  - "The route is configured in BOTH directions, so request and response are both protected."
  - "The selected mode decides whether sensitive values are replaced, synthesized, or blocked entirely."
policies.piiSanitizer.title: "PII Sanitization"
policies.piiSanitizer.why: "It shows privacy controls at the gateway rather than in every application and prompt path."
policies.promptCompression.appliedRoute.ratio: "Prompt-compress ratio orchestrator route"
policies.promptCompression.appliedRoute.tokenCount: "Prompt-compress token-count orchestrator route"
policies.promptCompression.intro: "Kong compresses the verbose user prompt before it reaches the model, reducing the number of input tokens sent upstream."
policies.promptCompression.mode.ratio: "By Ratio (50%)"
policies.promptCompression.mode.tokenCount: "By Token Count (100 tokens)"
policies.promptCompression.plainEnglish:
  - "The application sends the full verbose prompt to Kong."
  - "Kong forwards the prompt to the AI Prompt Compressor service and replaces it with the compressed version before the model call."
  - "The model still returns a normal answer, while Kong logs the original tokens, compressed tokens, and saved tokens for Grafana."
policies.promptCompression.title: "Prompt Compression"
policies.promptCompression.why: "It shows prompt-size governance, lower token cost, and context-window control at the gateway layer."
policies.promptEnhancement.additionalRequirements: "Enterprise-safe tone, regulatory mention when relevant, end with confidence score and owner"
policies.promptEnhancement.intro: "Kong adds extra governance instructions to the orchestrator prompt before the model sees it."
policies.promptEnhancement.mode.decorated: "With Decorator"
policies.promptEnhancement.mode.plain: "Without Decorator"
policies.promptEnhancement.plainEnglish:
  - "The plain route forwards the prompt unchanged."
  - "The decorated route prepends extra system instructions on the Kong route."
  - "Those injected instructions force a more structured, executive-safe response without changing the application code."
policies.promptEnhancement.prependedMessage1: "You are responding under AI governance enforced by Kong Gateway."
policies.promptEnhancement.prependedMessage2: "Executive escalation policy with sections: Situation, Risk, Actions, Next Checkpoint"
policies.promptEnhancement.title: "Prompt Decorator"
policies.promptEnhancement.whereApplied.decorated: "Decorated prompt-enhancement probe route"
policies.promptEnhancement.whereApplied.plain: "Plain prompt-enhancement probe route"
policies.promptEnhancement.why: "It shows how response style and prompt standards can be enforced centrally."
policies.rag.config:
  - ["Policy", "AI RAG Injector"]
  - ["Vector store", "Redis"]
  - ["Embedding model", "text-embedding-3-large"]
  - ["Answer model", "OpenAI 4o mini"]
  - ["Demo shape", "Before and after comparison"]
policies.rag.intro: "Kong uses AI RAG Injector to retrieve fictional AtlasFlow support KB content from Redis and inject it into the prompt before forwarding the request upstream."
policies.rag.plainEnglish:
  - "The baseline run sends the support question directly to the model."
  - "The RAG run embeds the question, retrieves the closest AtlasFlow KB chunks from Redis, and injects them into the prompt."
  - "The grounded route should answer with more specific support guidance than the baseline route."
policies.rag.title: "RAG"
policies.rag.why: "It shows retrieval and grounding at the gateway layer instead of in application code."
policies.semanticCache.config:
  - ["Policy", "AI Semantic Cache"]
  - ["Embedding model", "text-embedding-3-small"]
  - ["Vector store", "Redis"]
  - ["Distance metric", "cosine"]
  - ["Vector threshold", "0.1"]
  - ["Demo shape", "First request misses, second similar request hits"]
policies.semanticCache.intro: "Kong checks Redis for a semantically similar prior prompt before deciding whether it needs to call the model again."
policies.semanticCache.plainEnglish:
  - "The first request seeds the cache."
  - "Kong embeds the prompt, checks Redis, misses, and forwards the request to the model."
  - "The second similar request hits the cache and returns from Kong without invoking the model again."
policies.semanticCache.title: "Semantic Cache"
policies.semanticCache.why: "It demonstrates lower cost and faster reuse for semantically similar prompts."
policies.semanticGuard.config:
  - ["Policy", "AI Semantic Prompt Guard"]
  - ["Embedding model", "text-embedding-3-small"]
  - ["Vector store", "Redis"]
  - ["Distance metric", "cosine"]
  - ["Search threshold", "0.5"]
  - ["Vector threshold", "0.2"]
  - ["Demo shape", "Single prompt, allow or block"]
  - ["Denied themes", "Violence, confidential info, and policy bypass prompts"]
policies.semanticGuard.intro: "Kong treats this as a one-shot policy probe: one prompt goes in, and Kong either allows it or blocks it before the model call."
policies.semanticGuard.plainEnglish:
  - "Kong generates an embedding for the prompt before any model call is made."
  - "It compares that embedding against denied topics stored in Redis using cosine similarity."
  - "If the prompt is semantically close to a denied topic, Kong blocks it. If not, Kong allows the prompt to reach the model and returns the response directly."
policies.semanticGuard.title: "Semantic Guard"
policies.semanticGuard.why: "It shows semantic allow-or-deny behavior based on meaning, not simple keyword matching."
policies.tokenLimit.config:
  - ["Subscene", "Consumer Token Rate Limit"]
  - ["Protected route", "Orchestrator AI route"]
  - ["Policy", "AI Rate Limiting Advanced"]
  - ["Provider key", "openai"]
  - ["Configured limit", "1 request"]
  - ["Window", "300 seconds"]
  - ["Expected outcome", "A later orchestrator LLM call is blocked with HTTP 429"]
policies.tokenLimit.intro: "Kong applies a gateway-side rate limit on a focused probe route and blocks the request once the configured consumer budget is exhausted."
policies.tokenLimit.plainEnglish:
  - "The route is protected by AI Rate Limiting Advanced."
  - "This subscene demonstrates a consumer-scoped token rate limit."
  - "The first probe request is expected to be allowed through."
  - "The second probe request is expected to be rejected at Kong with HTTP 429 instead of reaching the provider."
policies.tokenLimit.title: "AI Token Rate Limit"
policies.tokenLimit.why: "It demonstrates usage control and budget enforcement at the gateway."
