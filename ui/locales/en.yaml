help.businessCopy: "A customer escalation enters through the dashboard. The system needs to gather account context, investigate the technical issue, prepare the customer-facing follow-up, and produce an executive brief quickly."
help.businessLabel: "Business Scenario"
help.copy: "The demo models a customer escalation for an enterprise account that reports a billing dispute and workflow-agent sync delays. Kong stays in the middle of the UI, MCP tools, sub-agents, LLM routes, and observability path so each hop is governed and traceable."
help.eyebrow: "About The Demo"
help.orchestratorCopy: "The orchestrator is the main LangGraph workflow. It discovers and calls MCP tools, creates the triage brief, invokes the support and success sub-agents, and assembles the final executive response."
help.orchestratorLabel: "Orchestrator"
help.successCopy: "The success agent handles customer communication and follow-up. It uses tools to draft the customer reply, create the next task, and shape the account-team action plan."
help.successLabel: "Success Agent"
help.supportCopy: "The support agent handles the technical investigation. It uses incident and runbook tools, summarizes the current engineering posture, and recommends the immediate remediation path."
help.supportLabel: "Support Agent"
help.title: "Scenario And Agent Roles"
