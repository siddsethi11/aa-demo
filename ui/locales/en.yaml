nodeDetails.backendApi.config:
  - ["Provides", "Business and support data used by the demo"]
  - ["Reached through", "Kong-governed routing"]
nodeDetails.backendApi.intro: "These are the mock upstream systems that hold the data used by the tools and agents."
nodeDetails.backendApi.plainEnglish:
  - "They provide account, incident, runbook, reply, and task data."
  - "The topology now shows them behind Kong rather than directly behind MCP."
  - "They act as the raw upstream data plane in the demo."
nodeDetails.backendApi.title: "Backend APIs"
nodeDetails.backendApi.why: "They make the difference between direct backend access and Kong-governed access visible."
nodeDetails.compressor.config:
  - ["Scenario", "Prompt Compression"]
  - ["Modes", "rate, target_token"]
nodeDetails.compressor.intro: "This service appears when Kong compresses a verbose prompt before the upstream model call."
nodeDetails.compressor.plainEnglish:
  - "Kong sends the request prompt here before the model call when the scenario uses prompt compression."
  - "The service returns a compressed prompt and token-savings metadata."
  - "It only appears during the Prompt Compression scenario."
nodeDetails.compressor.title: "AI Compress Service"
nodeDetails.compressor.why: "It makes the external compression step visible as part of the governed LLM path."
nodeDetails.gemini.config:
  - ["Used by", "Sub-agents and selected scenario paths"]
  - ["Governed through", "Kong AI routing"]
nodeDetails.gemini.intro: "This model path is shared by sub-agents and selected orchestrator scenarios."
nodeDetails.gemini.plainEnglish:
  - "Kong routes the support and success agents here in the base flow."
  - "It also appears for failover or judge-related scenario paths."
  - "The node represents the governed route choice, not just a raw provider logo."
nodeDetails.gemini.title: "Gemini 2.5 Flash"
nodeDetails.gemini.why: "It shows that Kong can split or redirect model traffic by role and scenario."
nodeDetails.judgeModel.config:
  - ["Scenario", "LLM as Judge"]
  - ["Purpose", "Quality scoring and judgment"]
nodeDetails.judgeModel.intro: "This node appears in the LLM as Judge scenario when Kong scores a candidate response with a separate model."
nodeDetails.judgeModel.plainEnglish:
  - "Kong invokes the judge after the candidate response is produced."
  - "The judge returns a score and evaluation context."
  - "That output is then exposed in observability and the final result path."
nodeDetails.judgeModel.title: "Judge Model"
nodeDetails.judgeModel.why: "It makes evaluation at the gateway layer visible."
nodeDetails.lakera.config:
  - ["Used by", "Lakera Policy Guard"]
  - ["Role", "Prompt inspection and allow-or-block decision"]
nodeDetails.lakera.intro: "Lakera inspects the prompt on the Kong route before the upstream model call is allowed to happen."
nodeDetails.lakera.plainEnglish:
  - "Kong sends the prompt to Lakera for policy inspection before the model call."
  - "Lakera can allow the request or block it with detector categories."
  - "It only appears during the Lakera Policy Guard scenario."
nodeDetails.lakera.title: "Lakera"
nodeDetails.lakera.why: "It makes the external policy guard visible as part of the governed data path."
nodeDetails.mcp.config:
  - ["Protocol", "MCP via Kong"]
  - ["Registry", "AA Demo MCP Registry"]
  - ["Published server", "com.aa-demo/mock-mcp"]
  - ["Registry remote", "http://localhost:8000/mock-mcp"]
  - ["Governed by", "Per-agent auth and authorization"]
  - ["Orchestrator tools", "get_customer_account, get_renewal_risk, get_open_tickets"]
  - ["Support tools", "get_incident_status, search_runbook"]
  - ["Success tools", "draft_customer_reply, create_followup_task"]
nodeDetails.mcp.intro: "Kong exposes the backing APIs as MCP tools, publishes the server in Konnect MCP Registry, and filters the allowed tool set per agent."
nodeDetails.mcp.plainEnglish:
  - "Agents ask Kong for the tool list instead of discovering raw APIs directly."
  - "The same MCP server is published in Konnect as AA Demo MCP Registry for internal discovery."
  - "Kong applies auth and access control before returning tools."
  - "Tool invocations still route back through Kong before reaching backend services."
nodeDetails.mcp.title: "MCP Tools"
nodeDetails.mcp.why: "It is where API governance becomes agent-tool governance, with Konnect Registry handling discovery metadata and Kong handling runtime control."
nodeDetails.observability.config:
  - ["Receives", "Structured Kong logs"]
  - ["Correlates by", "run_id and gateway metadata"]
nodeDetails.observability.intro: "Observability receives Kong gateway logs and makes them queryable by run and scenario."
nodeDetails.observability.plainEnglish:
  - "Kong sends structured logs into Loki."
  - "Grafana reads those logs to show counts, failures, and policy events."
  - "The same run_id ties the topology, trace, and metrics together."
nodeDetails.observability.title: "Grafana / Loki"
nodeDetails.observability.why: "It provides evidence for the governed path the topology is visualizing."
nodeDetails.openai.config:
  - ["Used by", "Orchestrator"]
  - ["Role", "Planner, triage, and final executive summary"]
nodeDetails.openai.intro: "This is the primary orchestrator model path in the standard run."
nodeDetails.openai.plainEnglish:
  - "Kong routes orchestrator planning and summary calls here in the normal flow."
  - "Some scenarios change how Kong governs this route."
  - "It is kept separate from the shared sub-agent route."
nodeDetails.openai.title: "OpenAI 4o mini"
nodeDetails.openai.why: "It shows caller-specific model routing at the gateway layer."
nodeDetails.orchestrator.config:
  - ["Framework", "LangGraph"]
  - ["Calls through Kong", "MCP, A2A sub-agents, and orchestrator AI routes"]
nodeDetails.orchestrator.intro: "The orchestrator is the main workflow coordinator for the escalation."
nodeDetails.orchestrator.plainEnglish:
  - "It gathers account context through Kong-exposed tools."
  - "It discovers and calls the support and success agents through Kong's A2A routes."
  - "It performs the final synthesis before returning the result."
nodeDetails.orchestrator.title: "Orchestrator"
nodeDetails.orchestrator.why: "It turns multiple governed tool and agent hops into one business outcome."
nodeDetails.piiService.config:
  - ["Scenario", "PII Sanitization"]
  - ["Modes", "placeholder, synthetic, block"]
nodeDetails.piiService.intro: "This service appears when Kong sanitizes or blocks sensitive content in request or response paths."
nodeDetails.piiService.plainEnglish:
  - "Kong sends request content here before the model call when the scenario uses sanitization."
  - "It can also sanitize the response before Kong returns it."
  - "The exact behavior depends on placeholder, synthetic, or block mode."
nodeDetails.piiService.title: "AI PII Service"
nodeDetails.piiService.why: "It shows that privacy enforcement can happen outside application code."
nodeDetails.redis.config:
  - ["Used by", "Semantic Guard, Semantic Cache, and RAG"]
  - ["Role", "Embedding-backed similarity store"]
nodeDetails.redis.intro: "Redis backs the semantic governance scenarios by storing or comparing embeddings."
nodeDetails.redis.plainEnglish:
  - "Kong uses it for semantic guard comparisons."
  - "Kong also uses it for semantic cache lookup and reuse."
  - "Kong also uses it as the retrieval store for the RAG scenario."
  - "It only appears when the semantic scenarios are relevant."
nodeDetails.redis.title: "Redis Vector DB"
nodeDetails.redis.why: "It shows the supporting infrastructure behind semantic policy behavior."
nodeDetails.successAgent.config:
  - ["Allowed tools", "draft_customer_reply, create_followup_task"]
  - ["LLM path", "Sub-agent Gemini route through Kong"]
nodeDetails.successAgent.intro: "The success agent handles follow-up planning and customer communication."
nodeDetails.successAgent.plainEnglish:
  - "It resolves only its allowed tools through Kong."
  - "It drafts the reply and creates the follow-up task."
  - "It turns those outputs into a customer-ready plan."
nodeDetails.successAgent.title: "Success Agent"
nodeDetails.successAgent.why: "It makes the customer and account-team actions explicit in the governed flow."
nodeDetails.supportAgent.config:
  - ["Allowed tools", "get_incident_status, search_runbook"]
  - ["LLM path", "Sub-agent Gemini route through Kong"]
nodeDetails.supportAgent.intro: "The support agent handles the technical investigation side of the escalation."
nodeDetails.supportAgent.plainEnglish:
  - "It resolves its allowed tools through Kong."
  - "It checks incident status and runbook guidance."
  - "It summarizes the technical posture through the sub-agent AI route."
nodeDetails.supportAgent.title: "Support Agent"
nodeDetails.supportAgent.why: "It converts incident data into technical guidance for the orchestrator."
nodeDetails.ui.config:
  - ["Served through", "Kong"]
  - ["Role", "Launch runs and visualize governed flow"]
nodeDetails.ui.intro: "The dashboard starts runs, renders the live topology, and streams trace updates."
nodeDetails.ui.plainEnglish:
  - "The UI goes through Kong instead of calling services directly."
  - "It shows the path activation, trace tree, and run output."
  - "It also exposes the scene, diagrams, and detail modals used in the demo."
nodeDetails.ui.title: "Dashboard"
nodeDetails.ui.why: "It makes the governed traffic and the business workflow visible in one place."
nodeDetails.user.config:
  - ["Input", "Customer escalation request"]
  - ["Carries", "Scene data, governance_scenario, run_id"]
nodeDetails.user.intro: "The demo starts here with one guided request entering the hosted UI."
nodeDetails.user.plainEnglish:
  - "This is the business request that starts the workflow."
  - "The request carries the selected governance scenario and the shared run_id."
  - "Everything downstream is correlated back to this entry point."
nodeDetails.user.title: "User Request"
nodeDetails.user.why: "It establishes the business context Kong will govern."
