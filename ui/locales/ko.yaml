  - "Lakera가 요청을 차단하면 Kong은 탐지 카테고리를 반환하고 차단된 프롬프트 전체를 관측용으로 기록합니다."
policies.lakeraGuard.title: "Lakera Policy Guard"
policies.lakeraGuard.why: "앱 측 검열 코드 없이 게이트웨이에서 외부 정책을 적용할 수 있음을 보여 줍니다."
