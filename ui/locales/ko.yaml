policies.semanticCache.intro: "Kong은 모델을 다시 호출할지 결정하기 전에 Redis에서 의미적으로 유사한 이전 프롬프트가 있는지 확인합니다."
policies.semanticCache.plainEnglish:
  - "첫 요청이 캐시를 시드합니다."
  - "Kong은 프롬프트를 임베딩하고 Redis를 확인한 뒤 미스이면 모델로 요청을 전달합니다."
  - "두 번째 유사 요청은 캐시에 히트해 모델을 다시 호출하지 않고 Kong에서 반환됩니다."
policies.semanticCache.title: "Semantic Cache"
policies.semanticCache.why: "의미적으로 유사한 프롬프트에 대한 비용 절감과 빠른 재사용을 보여 줍니다."
