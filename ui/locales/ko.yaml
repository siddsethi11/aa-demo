graph.orchestratorCopy: "이는 <code>services/orchestrator/app.py</code>에서 컴파일되는 오케스트레이터 그래프와 일치합니다. 컨텍스트 조회, 요청 분류 브리프 생성, 지원 에이전트 실행, 성공 에이전트 실행, 응답 확정 순서입니다."
graph.sequenceCopy: "이 시퀀스는 표준 해피 패스를 따릅니다. UI가 Kong을 통해 실행을 시작하고, 오케스트레이터가 MCP 컨텍스트를 가져오며, 각 서브 에이전트를 A2A 에이전트 카드로 검색하고, Kong을 경유한 JSON-RPC로 `agent.run`을 호출한 뒤, 라이브 트레이스를 UI로 스트리밍하면서 최종 요약으로 마무리합니다."
