policies.loadBalancing.plainEnglish.semantic:
  - "오케스트레이터가 Kong을 통해 하나의 집중 프로브 요청을 보냅니다."
  - "Kong은 프롬프트를 임베딩하고 시맨틱 밸런서용 저장된 대상 설명과 비교합니다."
