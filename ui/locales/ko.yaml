policies.semanticGuard.intro: "Kong은 이를 일회성 정책 프로브로 처리합니다. 프롬프트 하나가 들어가면 Kong이 모델 호출 전에 허용하거나 차단합니다."
policies.semanticGuard.plainEnglish:
  - "Kong은 모델 호출 전에 프롬프트 임베딩을 생성합니다."
  - "코사인 유사도로 Redis에 저장된 거부 주제와 해당 임베딩을 비교합니다."
  - "프롬프트가 거부 주제와 의미적으로 가깝면 Kong이 차단하고, 그렇지 않으면 모델에 도달하도록 허용한 뒤 응답을 직접 반환합니다."
policies.semanticGuard.title: "Semantic Guard"
policies.semanticGuard.why: "단순 키워드 매칭이 아닌 의미 기반 허용·거부 동작을 보여 줍니다."
