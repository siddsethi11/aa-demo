policies.loadBalancing.why.semantic: "모델 선택을 애플리케이션 로직에 하드코딩하지 않고 게이트웨이 계층에서 프롬프트 인식 라우팅을 보여 줍니다."
policies.normal.config:
  - ["UI 접근", "UI 컨슈머 키를 사용한 Key-auth"]
  - ["에이전트 간", "AI A2A Proxy가 검색 및 메시지/스트림 실행 처리"]
  - ["도구 노출", "AI MCP Proxy가 컨슈머 그룹별 허용 도구만 노출"]
  - ["오케스트레이터 LLM 경로", "AI Proxy Advanced → OpenAI 4o mini"]
  - ["서브 에이전트 LLM 경로", "AI Proxy Advanced → Gemini 2.5 Flash"]
policies.normal.intro: "기준 멀티 에이전트 흐름입니다. Kong은 MCP 도구 접근, A2A 검색·실행, 모델 라우팅을 포함한 전체 오케스트레이션 경로 앞에 위치합니다."
policies.normal.plainEnglish:
  - "UI는 하나의 에스컬레이션 요청을 Kong을 통해 오케스트레이터로 보냅니다."
  - "Kong이 A2A를 통해 서브 에이전트 검색 및 인계를 처리하므로 오케스트레이터는 에이전트와 직접 통신하지 않습니다."
  - "Kong은 모의 REST API를 MCP 도구로 노출하므로 오케스트레이터와 서브 에이전트는 원시 엔드포인트 대신 거버넌스 적용 도구를 호출합니다."
  - "Kong은 오케스트레이터 LLM 트래픽을 OpenAI로, 서브 에이전트 LLM 트래픽을 Gemini로 라우팅한 뒤 최종 에스컬레이션 브리프 하나를 반환합니다."
policies.normal.title: "Normal"
policies.normal.why: "나머지 거버넌스 시나리오의 기준 경로입니다."
policies.piiSanitizer.intro: "Kong은 민감 데이터가 게이트웨이를 떠나기 전에 정제하고, 모델 응답이 UI로 돌아가기 전에도 정제합니다."
policies.piiSanitizer.plainEnglish:
  - "Kong은 모델 호출 전 프롬프트와 UI 반환 전 응답을 검사합니다."
  - "경로가 양방향으로 구성되어 요청과 응답이 모두 보호됩니다."
  - "선택한 모드에 따라 민감 값이 대체되거나 합성되거나 완전히 차단됩니다."
policies.piiSanitizer.title: "PII Sanitization"
policies.piiSanitizer.why: "모든 애플리케이션과 프롬프트 경로가 아닌 게이트웨이에서 개인정보 제어를 보여 줍니다."
policies.promptCompression.appliedRoute.ratio: "프롬프트 압축(비율) 오케스트레이터 경로"
policies.promptCompression.appliedRoute.tokenCount: "프롬프트 압축(토큰 수) 오케스트레이터 경로"
policies.promptCompression.intro: "Kong은 장황한 사용자 프롬프트가 모델에 도달하기 전에 압축해 업스트림으로 보내는 입력 토큰 수를 줄입니다."
policies.promptCompression.mode.ratio: "비율 기준 (50%)"
policies.promptCompression.mode.tokenCount: "토큰 수 기준 (100 토큰)"
policies.promptCompression.plainEnglish:
  - "애플리케이션은 전체 장황한 프롬프트를 Kong으로 보냅니다."
  - "Kong은 프롬프트를 AI Prompt Compressor 서비스로 전달하고 모델 호출 전에 압축 버전으로 대체합니다."
  - "모델은 정상적으로 답변을 반환하고 Kong은 원본 토큰, 압축 토큰, 절감 토큰을 Grafana용으로 기록합니다."
policies.promptCompression.title: "Prompt Compression"
policies.promptCompression.why: "게이트웨이 계층의 프롬프트 크기 거버넌스, 토큰 비용 절감, 컨텍스트 윈도우 제어를 보여 줍니다."
policies.promptEnhancement.additionalRequirements: "엔터프라이즈에 적합한 톤, 필요 시 규제 언급, 마지막에 신뢰도 점수와 담당자 포함"
policies.promptEnhancement.intro: "Kong은 모델이 프롬프트를 보기 전에 오케스트레이터 프롬프트에 추가 거버넌스 지침을 더합니다."
policies.promptEnhancement.mode.decorated: "데코레이터 적용"
policies.promptEnhancement.mode.plain: "데코레이터 미적용"
policies.promptEnhancement.plainEnglish:
  - "일반 경로는 프롬프트를 변경하지 않고 전달합니다."
  - "데코레이트 경로는 Kong 경로에서 추가 시스템 지침을 앞에 붙입니다."
  - "주입된 지침은 애플리케이션 코드를 바꾸지 않고도 더 구조화되고 경영진에 적합한 응답을 강제합니다."
policies.promptEnhancement.prependedMessage1: "당신은 Kong Gateway가 적용하는 AI 거버넌스 하에서 응답하고 있습니다."
policies.promptEnhancement.prependedMessage2: "경영진 에스컬레이션 정책. 섹션: 상황, 위험, 조치, 다음 체크포인트"
policies.promptEnhancement.title: "Prompt Decorator"
policies.promptEnhancement.whereApplied.decorated: "데코레이트 프롬프트 향상 프로브 경로"
policies.promptEnhancement.whereApplied.plain: "일반 프롬프트 향상 프로브 경로"
policies.promptEnhancement.why: "응답 스타일과 프롬프트 기준을 중앙에서 적용할 수 있음을 보여 줍니다."
policies.rag.config:
  - ["정책", "AI RAG Injector"]
  - ["벡터 저장소", "Redis"]
  - ["임베딩 모델", "text-embedding-3-large"]
  - ["답변 모델", "OpenAI 4o mini"]
  - ["데모 형태", "적용 전후 비교"]
policies.rag.intro: "Kong은 AI RAG Injector로 Redis에서 가상 AtlasFlow 지원 KB 콘텐츠를 검색해 업스트림으로 전달하기 전에 프롬프트에 주입합니다."
policies.rag.plainEnglish:
  - "기준 실행은 지원 질문을 모델로 직접 보냅니다."
  - "RAG 실행은 질문을 임베딩하고 Redis에서 가장 가까운 AtlasFlow KB 청크를 검색해 프롬프트에 주입합니다."
  - "그라운딩된 경로는 기준 경로보다 더 구체적인 지원 가이드를 답변해야 합니다."
policies.rag.title: "RAG"
policies.rag.why: "검색과 그라운딩을 애플리케이션 코드가 아닌 게이트웨이 계층에서 보여 줍니다."
policies.semanticCache.config:
  - ["정책", "AI Semantic Cache"]
  - ["임베딩 모델", "text-embedding-3-small"]
  - ["벡터 저장소", "Redis"]
