help.businessCopy: "고객 에스컬레이션이 대시보드를 통해 들어옵니다. 시스템은 계정 컨텍스트를 수집하고, 기술 이슈를 조사하며, 고객 대면 후속 조치를 준비하고, 경영진 브리프를 신속히 작성해야 합니다."
help.businessLabel: "비즈니스 시나리오"
help.copy: "이 데모는 청구 분쟁과 워크플로 에이전트 동기화 지연을 보고한 엔터프라이즈 계정의 고객 에스컬레이션을 모델링합니다. Kong은 UI, MCP 도구, 서브 에이전트, LLM 경로, 관측 경로의 중심에 있어 각 홉이 거버넌스 적용 및 추적 가능하도록 합니다."
help.eyebrow: "데모 소개"
help.orchestratorCopy: "오케스트레이터는 메인 LangGraph 워크플로입니다. MCP 도구를 검색·호출하고, 요청 분류 브리프를 생성하며, 지원 및 성공 서브 에이전트를 호출하고, 최종 경영진 응답을 조립합니다."
help.orchestratorLabel: "오케스트레이터"
help.successCopy: "성공 에이전트는 고객 커뮤니케이션과 후속 조치를 담당합니다. 도구를 사용해 고객 회신을 작성하고, 다음 작업을 생성하며, 계정팀 조치 계획을 구성합니다."
help.successLabel: "성공 에이전트"
help.supportCopy: "지원 에이전트는 기술 조사를 담당합니다. 인시던트 및 런북 도구를 사용해 현재 엔지니어링 상황을 요약하고, 즉각적인 복구 경로를 권장합니다."
help.supportLabel: "지원 에이전트"
help.title: "시나리오 및 에이전트 역할"
