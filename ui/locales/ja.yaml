nodeDetails.lakera.plainEnglish:
  - "Kong はモデル呼び出し前に、ポリシー検査のためプロンプトを Lakera へ送ります。"
  - "Lakera はリクエストを許可するか、検出カテゴリとともにブロックできます。"
  - "Lakera ポリシーガードシナリオの間のみ表示されます。"
nodeDetails.lakera.title: "Lakera"
