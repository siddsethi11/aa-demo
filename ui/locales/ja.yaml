policies.loadBalancing.intro.failover: "Kong はまずプライマリの OpenAI 経路を試し、その経路が失敗するよう構成されている場合は Gemini にフェイルオーバーします。"
policies.loadBalancing.intro.semantic: "Kong はプロバイダー呼び出しを行う前に、プロンプトを意味的に最も関連性の高いモデルターゲットへルーティングします。"
policies.loadBalancing.plainEnglish.failover:
  - "オーケストレーターは Kong 経由で 1 件の焦点を絞ったプローブリクエストを送ります。"
  - "Kong はそのリクエストをまずプライマリの OpenAI ターゲットへ送ります。"
  - "プライマリ経路が失敗すると、Kong は Gemini のフォールバックターゲットで再試行し、フォールバック結果を返します。"
policies.loadBalancing.plainEnglish.semantic:
  - "オーケストレーターは Kong 経由で 1 件の焦点を絞ったプローブリクエストを送ります。"
  - "Kong はプロンプトを埋め込み、セマンティックバランサー用に保存されたターゲットの説明と比較します。"
  - "次に Kong は最適なモデルターゲットへリクエストを送り、その結果を直接返します。"
policies.loadBalancing.promptPreset.creative: "クリエイティブ / マーケティング"
policies.loadBalancing.promptPreset.support: "サポート / オペレーション"
policies.loadBalancing.title: "ロードバランシング"
policies.loadBalancing.why.failover: "アプリケーションコードではなくゲートウェイ層でのモデルの回復性を示します。"
policies.loadBalancing.why.semantic: "モデルの選択をアプリケーションロジックにハードコーディングするのではなく、ゲートウェイ層でプロンプトに応じたモデルルーティングを行えることを示します。"
policies.normal.config:
  - ["UI アクセス", "UI コンシューマーキーを使った Key-auth"]
  - ["エージェント間連携", "AI A2A Proxy が検出とメッセージ/ストリームの実行を処理"]
  - ["ツールの公開", "AI MCP Proxy がコンシューマーグループごとに許可されたツールのみを公開"]
  - ["オーケストレーター LLM ルート", "AI Proxy Advanced から OpenAI 4o mini へ"]
  - ["サブエージェント LLM ルート", "AI Proxy Advanced から Gemini 2.5 Flash へ"]
policies.normal.intro: "これはベースラインとなるマルチエージェントフローです。Kong は MCP ツールアクセス、A2A の検出と実行、モデルルーティングを含むオーケストレーション経路全体の前面に立ちます。"
policies.normal.plainEnglish:
  - "UI は 1 件のエスカレーションリクエストを Kong 経由でオーケストレーターへ送ります。"
  - "Kong が A2A を通じてサブエージェントの検出と引き継ぎを処理するため、オーケストレーターがエージェントと直接やり取りすることはありません。"
  - "Kong はモックの REST API を MCP ツールとして公開するため、オーケストレーターとサブエージェントは生のエンドポイントではなくガバナンス対象のツールを呼び出します。"
  - "Kong はオーケストレーターの LLM トラフィックを OpenAI へ、サブエージェントの LLM トラフィックを Gemini へルーティングし、最終的なエスカレーションブリーフを 1 件返します。"
policies.normal.title: "通常"
policies.normal.why: "他のすべてのガバナンスシナリオの基準となる経路です。"
policies.piiSanitizer.intro: "Kong は機密データがゲートウェイを出る前にサニタイズし、モデルのレスポンスが UI に戻る前にもサニタイズします。"
policies.piiSanitizer.plainEnglish:
  - "Kong はモデル呼び出し前のプロンプトと、UI に戻る前のレスポンスを検査します。"
  - "ルートは双方向に構成されているため、リクエストとレスポンスの両方が保護されます。"
  - "選択したモードによって、機密値を置換するか、合成するか、完全にブロックするかが決まります。"
policies.piiSanitizer.title: "PII サニタイズ"
policies.piiSanitizer.why: "すべてのアプリケーションやプロンプト経路ではなく、ゲートウェイでプライバシー制御を行えることを示します。"
policies.promptCompression.appliedRoute.ratio: "プロンプト圧縮（比率）オーケストレータールート"
policies.promptCompression.appliedRoute.tokenCount: "プロンプト圧縮（トークン数）オーケストレータールート"
policies.promptCompression.intro: "Kong は冗長なユーザープロンプトがモデルに到達する前に圧縮し、アップストリームへ送る入力トークン数を削減します。"
policies.promptCompression.mode.ratio: "比率指定（50%）"
policies.promptCompression.mode.tokenCount: "トークン数指定（100 トークン）"
policies.promptCompression.plainEnglish:
  - "アプリケーションは冗長なプロンプト全体を Kong に送ります。"
  - "Kong はプロンプトを AI Prompt Compressor サービスへ転送し、モデル呼び出し前に圧縮版に置き換えます。"
  - "モデルは通常どおり回答を返し、Kong は元のトークン数、圧縮後のトークン数、削減トークン数を Grafana 用にログ記録します。"
policies.promptCompression.title: "プロンプト圧縮"
policies.promptCompression.why: "ゲートウェイ層でのプロンプトサイズのガバナンス、トークンコストの削減、コンテキストウィンドウの制御を示します。"
policies.promptEnhancement.additionalRequirements: "エンタープライズに適したトーン、必要に応じた規制への言及、最後に信頼度スコアと担当者を記載"
policies.promptEnhancement.intro: "Kong はモデルがプロンプトを見る前に、オーケストレーターのプロンプトへ追加のガバナンス指示を加えます。"
policies.promptEnhancement.mode.decorated: "デコレーターあり"
policies.promptEnhancement.mode.plain: "デコレーターなし"
policies.promptEnhancement.plainEnglish:
  - "プレーンルートはプロンプトを変更せずに転送します。"
  - "デコレーテッドルートは Kong ルート上で追加のシステム指示を先頭に付加します。"
  - "注入されたこれらの指示は、アプリケーションコードを変更することなく、より構造化されエグゼクティブに適したレスポンスを強制します。"
policies.promptEnhancement.prependedMessage1: "あなたは Kong Gateway によって強制される AI ガバナンスのもとで応答しています。"
policies.promptEnhancement.prependedMessage2: "エグゼクティブエスカレーションポリシー。セクション構成: 状況、リスク、アクション、次のチェックポイント"
policies.promptEnhancement.title: "プロンプトデコレーター"
policies.promptEnhancement.whereApplied.decorated: "デコレーテッドプロンプト拡張プローブルート"
policies.promptEnhancement.whereApplied.plain: "プレーンプロンプト拡張プローブルート"
policies.promptEnhancement.why: "レスポンスのスタイルとプロンプトの基準を、一元的に強制できることを示します。"
policies.rag.config:
  - ["ポリシー", "AI RAG Injector"]
  - ["ベクターストア", "Redis"]
  - ["埋め込みモデル", "text-embedding-3-large"]
  - ["回答モデル", "OpenAI 4o mini"]
  - ["デモの形態", "前後比較"]
policies.rag.intro: "Kong は AI RAG Injector を使い、架空の AtlasFlow サポート KB のコンテンツを Redis から取得し、リクエストをアップストリームへ転送する前にプロンプトへ注入します。"
policies.rag.plainEnglish:
  - "ベースライン実行は、サポートに関する質問をモデルへ直接送ります。"
  - "RAG 実行は質問を埋め込み、最も近い AtlasFlow KB のチャンクを Redis から取得してプロンプトへ注入します。"
  - "グラウンディングされたルートは、ベースラインルートよりも具体的なサポートガイダンスで回答するはずです。"
policies.rag.title: "RAG"
policies.rag.why: "検索とグラウンディングを、アプリケーションコードではなくゲートウェイ層で行えることを示します。"
policies.semanticCache.config:
  - ["ポリシー", "AI Semantic Cache"]
  - ["埋め込みモデル", "text-embedding-3-small"]
  - ["ベクターストア", "Redis"]
  - ["距離メトリック", "cosine"]
  - ["ベクター閾値", "0.1"]
  - ["デモの形態", "最初のリクエストはミス、2 回目の類似リクエストはヒット"]
policies.semanticCache.intro: "Kong はモデルを再度呼び出す必要があるかを判断する前に、意味的に類似した過去のプロンプトがないか Redis を確認します。"
policies.semanticCache.plainEnglish:
  - "最初のリクエストでキャッシュをシードします。"
  - "Kong はプロンプトを埋め込み、Redis を確認し、ミスとなり、リクエストをモデルへ転送します。"
  - "2 回目の類似リクエストはキャッシュにヒットし、モデルを再度呼び出すことなく Kong から返されます。"
policies.semanticCache.title: "セマンティックキャッシュ"
policies.semanticCache.why: "意味的に類似したプロンプトについて、コスト削減と高速な再利用を実現できることを示します。"
policies.semanticGuard.config:
  - ["ポリシー", "AI Semantic Prompt Guard"]
  - ["埋め込みモデル", "text-embedding-3-small"]
  - ["ベクターストア", "Redis"]
  - ["距離メトリック", "cosine"]
  - ["検索閾値", "0.5"]
  - ["ベクター閾値", "0.2"]
  - ["デモの形態", "単一プロンプト、許可またはブロック"]
  - ["拒否テーマ", "暴力、機密情報、ポリシー回避のプロンプト"]
policies.semanticGuard.intro: "Kong はこれをワンショットのポリシープローブとして扱います。プロンプトを 1 件投入すると、Kong はモデル呼び出し前にそれを許可するかブロックします。"
policies.semanticGuard.plainEnglish:
  - "Kong はモデル呼び出しが行われる前に、プロンプトの埋め込みを生成します。"
  - "その埋め込みを、Redis に保存された拒否トピックとコサイン類似度で比較します。"
  - "プロンプトが拒否トピックと意味的に近い場合、Kong はブロックします。そうでない場合は、Kong はプロンプトがモデルに到達することを許可し、レスポンスを直接返します。"
policies.semanticGuard.title: "セマンティックガード"
policies.semanticGuard.why: "単純なキーワード一致ではなく、意味に基づくセマンティックな許可・拒否の挙動を示します。"
policies.tokenLimit.config:
  - ["サブシナリオ", "コンシューマートークンレート制限"]
  - ["保護対象ルート", "オーケストレーター AI ルート"]
  - ["ポリシー", "AI Rate Limiting Advanced"]
  - ["プロバイダーキー", "openai"]
  - ["構成済みの上限", "1 リクエスト"]
  - ["ウィンドウ", "300 秒"]
  - ["想定される結果", "その後のオーケストレーター LLM 呼び出しが HTTP 429 でブロックされる"]
policies.tokenLimit.intro: "Kong は焦点を絞ったプローブルートにゲートウェイ側のレート制限を適用し、構成されたコンシューマーの予算を使い切るとリクエストをブロックします。"
policies.tokenLimit.plainEnglish:
  - "このルートは AI Rate Limiting Advanced によって保護されています。"
  - "このサブシナリオはコンシューマー単位のトークンレート制限を示します。"
  - "最初のプローブリクエストは許可される想定です。"
  - "2 回目のプローブリクエストは、プロバイダーに到達せず Kong で HTTP 429 として拒否される想定です。"
policies.tokenLimit.title: "AI トークンレート制限"
policies.tokenLimit.why: "ゲートウェイでの使用量制御と予算の強制を示します。"
