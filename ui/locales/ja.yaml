help.businessCopy: "顧客エスカレーションがダッシュボードから入ってきます。システムはアカウントのコンテキストを収集し、技術的な問題を調査し、顧客向けのフォローアップを準備し、エグゼクティブブリーフを迅速に作成する必要があります。"
help.businessLabel: "ビジネスシナリオ"
help.copy: "このデモは、請求に関する係争とワークフローエージェントの同期遅延を報告するエンタープライズアカウントの顧客エスカレーションをモデル化しています。Kong は UI、MCP ツール、サブエージェント、LLM 経路、オブザーバビリティ経路の中心に位置し、各ホップをガバナンスのもとで追跡可能にします。"
help.eyebrow: "このデモについて"
help.orchestratorCopy: "オーケストレーターはメインの LangGraph ワークフローです。MCP ツールを検出して呼び出し、トリアージブリーフを作成し、サポートおよびサクセスのサブエージェントを呼び出し、最終的なエグゼクティブレスポンスを組み立てます。"
help.orchestratorLabel: "オーケストレーター"
help.successCopy: "サクセスエージェントは顧客とのコミュニケーションとフォローアップを担当します。ツールを使って顧客への返信を下書きし、次のタスクを作成し、アカウントチームのアクションプランを形にします。"
help.successLabel: "サクセスエージェント"
help.supportCopy: "サポートエージェントは技術調査を担当します。インシデントツールとランブックツールを使い、現在のエンジニアリング状況を要約し、即時の修復経路を提案します。"
help.supportLabel: "サポートエージェント"
