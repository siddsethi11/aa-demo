nodeDetails.mcp.intro: "Kong はバックエンド API を MCP ツールとして公開し、サーバーを Konnect MCP Registry に登録し、エージェントごとに許可されるツールセットをフィルタリングします。"
nodeDetails.mcp.plainEnglish:
  - "エージェントは生の API を直接検出するのではなく、Kong にツール一覧を問い合わせます。"
  - "同じ MCP サーバーが、内部検出用に AA Demo MCP Registry として Konnect に公開されています。"
  - "Kong はツールを返す前に認証とアクセス制御を適用します。"
  - "ツールの呼び出しも、バックエンドサービスに到達する前に Kong を経由します。"
nodeDetails.mcp.title: "MCP ツール"
nodeDetails.mcp.why: "ここで API ガバナンスがエージェントツールのガバナンスへと発展します。検出メタデータは Konnect Registry が、ランタイム制御は Kong が担います。"
nodeDetails.observability.config:
