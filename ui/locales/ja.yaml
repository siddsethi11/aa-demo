policies.lakeraGuard.config:
  - ["ポリシー", "AI Lakera Guard"]
  - ["失敗カテゴリの開示", "true"]
  - ["ブロックされたコンテンツのログ記録", "true"]
  - ["デモの形態", "単一プロンプト、許可またはブロック"]
policies.lakeraGuard.intro: "Kong はこれをワンショットの Lakera プローブとして扱います。プロンプトを 1 件投入すると、Lakera はモデル呼び出し前にそれをブロックするか許可します。"
policies.lakeraGuard.plainEnglish:
  - "Lakera はモデル呼び出しが発生する前にリクエストボディを検査します。"
  - "このデモでは、安全なプロンプトモードとブロックされるプロンプトモードを持つ 1 つの Lakera ルートを使用します。"
  - "Lakera がリクエストをブロックすると、Kong は検出カテゴリを返し、ブロックされたプロンプト全体をオブザーバビリティ用にログ記録します。"
policies.lakeraGuard.title: "Lakera ポリシーガード"
policies.lakeraGuard.why: "アプリ側のモデレーションコードなしに、ゲートウェイで外部ポリシーを強制できることを示します。"
policies.llmAsJudge.config:
  - ["ポリシー", "AI LLM as Judge"]
  - ["候補モデル", "OpenAI 4o mini"]
  - ["ジャッジモデル", "Gemini 2.5 Flash"]
  - ["ジャッジのルーブリック", "正確で、リクエストに関連し、ユーザーが提示したタスクに有用であること"]
  - ["プロンプトプリセット", "エスカレーショントリアージ、KongHQ 概要、または Kong vs Apigee/AWS"]
  - ["想定される結果", "レスポンスが 1 件返され、Kong がジャッジのレイテンシと正確性スコアをログ記録"]
policies.llmAsJudge.intro: "Kong はリクエストを候補モデルへ送り、続いて別のジャッジモデルを呼び出してレスポンスを採点します。"
policies.llmAsJudge.plainEnglish:
  - "ユーザープロンプトはまず候補モデルへ送られます。"
  - "次に Kong は候補レスポンスを別のジャッジモデルへ送ります。"
  - "判定結果は通常どおり返され、スコアリングのメタデータは Grafana 用にログへ書き込まれます。"
policies.llmAsJudge.title: "LLM as Judge"
policies.llmAsJudge.why: "アプリ側のスコアリングコードを追加せずに、ゲートウェイ側での評価を実現できることを示します。"
policies.llmFailover.config:
  - ["プライマリモデル", "OpenAI 4o mini"]
  - ["フォールバックモデル", "Gemini 2.5 Flash"]
  - ["プラグイン", "AI Proxy Advanced"]
policies.llmFailover.intro: "Kong はまずプライマリの OpenAI 経路を試し、その経路が失敗するよう構成されている場合は Gemini にフェイルオーバーします。"
policies.llmFailover.plainEnglish:
  - "オーケストレーターは Kong 経由で 1 件の焦点を絞ったプローブリクエストを送ります。"
  - "Kong はそのリクエストをまずプライマリの OpenAI ターゲットへ送ります。"
  - "プライマリ経路が失敗すると、Kong は Gemini のフォールバックターゲットで再試行し、フォールバック結果を返します。"
policies.llmFailover.title: "LLM フェイルオーバー"
policies.llmFailover.why: "アプリケーションコードではなくゲートウェイ層でのモデルの回復性を示します。"
