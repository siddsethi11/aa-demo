  - "シナリオがプロンプト圧縮を使用する場合、Kong はモデル呼び出し前にリクエストプロンプトをここへ送ります。"
  - "このサービスは圧縮済みプロンプトとトークン削減量のメタデータを返します。"
  - "プロンプト圧縮シナリオの間のみ表示されます。"
nodeDetails.compressor.title: "AI 圧縮サービス"
