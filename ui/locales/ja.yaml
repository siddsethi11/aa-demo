nodeDetails.observability.plainEnglish:
  - "Kong は構造化ログを Loki に送信します。"
  - "Grafana はそのログを読み取り、件数、失敗、ポリシーイベントを表示します。"
  - "同じ run_id によって、トポロジー、トレース、メトリクスが結び付けられます。"
